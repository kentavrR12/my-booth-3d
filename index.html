<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Exhibition Booth Configurator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #667eea; overflow: hidden; display: flex; height: 100vh; }
        .language-switcher { position: absolute; top: 10px; left: 10px; z-index: 1000; display: flex; gap: 5px; background: white; padding: 8px; border-radius: 6px; }
        .lang-btn { padding: 6px 12px; border: 2px solid #ddd; background: white; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 11px; }
        .lang-btn.active { background: #667eea; color: white; border-color: #667eea; }
        .sidebar { width: 350px; background: white; overflow-y: auto; padding: 20px; margin-top: 50px; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.1 ); }
        .category { background: #f5f5f5; border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
        .category-header { padding: 15px; background: #667eea; color: white; cursor: pointer; font-weight: 600; display: flex; justify-content: space-between; }
        .category-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; padding: 0 15px; }
        .category.active .category-content { max-height: 500px; padding: 15px; }
        .option-group { margin-bottom: 15px; }
        .option-label { font-size: 11px; font-weight: 700; color: #666; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .option-items { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .option-item { padding: 8px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; text-align: center; font-size: 12px; }
        .option-item.selected { background: #667eea; color: white; border-color: #667eea; }
        .price-section { background: #764ba2; color: white; padding: 15px; border-radius: 8px; margin-top: auto; text-align: center; }
        .price-value { font-size: 24px; font-weight: 700; margin: 10px 0; }
        .canvas-container { flex: 1; position: relative; }
        #canvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <div class="language-switcher">
        <button class="lang-btn active" onclick="setLanguage('ru')">🇷🇺 RU</button>
        <button class="lang-btn" onclick="setLanguage('en')">🇬🇧 EN</button>
        <button class="lang-btn" onclick="setLanguage('lv')">🇱🇻 LV</button>
    </div>
    <div class="sidebar">
        <div class="category active">
            <div class="category-header" onclick="this.parentElement.classList.toggle('active')"><span data-i18n="dimensions">Размеры</span> <span>▼</span></div>
            <div class="category-content">
                <div class="option-group">
                    <label class="option-label" data-i18n="length">Длина (м)</label>
                    <div class="option-items">
                        <button class="option-item" onclick="updateDim('length', 2)">2m</button>
                        <button class="option-item selected" onclick="updateDim('length', 4)">4m</button>
                        <button class="option-item" onclick="updateDim('length', 6)">6m</button>
                    </div>
                </div>
                <div class="option-group">
                    <label class="option-label" data-i18n="width">Ширина (м)</label>
                    <div class="option-items">
                        <button class="option-item" onclick="updateDim('width', 2)">2m</button>
                        <button class="option-item selected" onclick="updateDim('width', 3)">3m</button>
                        <button class="option-item" onclick="updateDim('width', 4)">4m</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="category">
            <div class="category-header" onclick="this.parentElement.classList.toggle('active')"><span data-i18n="walls">Стены</span> <span>▼</span></div>
            <div class="category-content">
                <input type="color" onchange="updateWallColor(this.value)" style="width:100%; height:30px;">
            </div>
        </div>
        <div class="price-section">
            <div data-i18n="total_price">Итоговая стоимость</div>
            <div class="price-value" id="totalPrice">8 900 €</div>
        </div>
    </div>
    <div class="canvas-container"><canvas id="canvas"></canvas></div>
    <script>
        const translations = {
            ru: { dimensions: "Размеры", length: "Длина", width: "Ширина", walls: "Стены", total_price: "Итого" },
            en: { dimensions: "Dimensions", length: "Length", width: "Width", walls: "Walls", total_price: "Total" },
            lv: { dimensions: "Izmēri", length: "Garums", width: "Platums", walls: "Sienas", total_price: "Kopā" }
        };
        function setLanguage(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = translations[lang][el.dataset.i18n]);
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().includes(lang)));
        }
        let scene, camera, renderer, boothGroup;
        const config = { length: 4, width: 3, color: 0xffffff };
        function init() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0xf5f5f5);
            camera = new THREE.PerspectiveCamera(75, (window.innerWidth-350)/window.innerHeight, 0.1, 1000);
            camera.position.set(5, 5, 5); camera.lookAt(0,0,0);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
            renderer.setSize(window.innerWidth-350, window.innerHeight);
            const light = new THREE.DirectionalLight(0xffffff, 1); light.position.set(5,10,5); scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            boothGroup = new THREE.Group(); scene.add(boothGroup);
            updateBooth(); animate();
        }
        function updateBooth() {
            boothGroup.clear();
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(config.length, config.width), new THREE.MeshStandardMaterial({ color: 0xcccccc }));
            floor.rotation.x = -Math.PI/2; boothGroup.add(floor);
            const wallMat = new THREE.MeshStandardMaterial({ color: config.color });
            const backWall = new THREE.Mesh(new THREE.PlaneGeometry(config.length, 2.5), wallMat);
            backWall.position.set(0, 1.25, -config.width/2); boothGroup.add(backWall);
            const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(config.width, 2.5), wallMat);
            leftWall.rotation.y = Math.PI/2; leftWall.position.set(-config.length/2, 1.25, 0); boothGroup.add(leftWall);
            document.getElementById('totalPrice').textContent = (config.length * config.width * 500 + 2000) + ' €';
        }
        function updateDim(type, val) { 
            config[type] = val; 
            event.target.parentElement.querySelectorAll('.option-item').forEach(b => b.classList.remove('selected'));
            event.target.classList.add('selected');
            updateBooth(); 
        }
        function updateWallColor(val) { config.color = parseInt(val.slice(1), 16); updateBooth(); }
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth-350, window.innerHeight);
            camera.aspect = (window.innerWidth-350)/window.innerHeight; camera.updateProjectionMatrix();
        });
        init();
    </script>
</body>
</html>
