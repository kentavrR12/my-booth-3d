<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exhibition Booth 3D Configurator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100vh;
            gap: 20px;
            padding: 20px;
        }

        .canvas-container {
            flex: 1;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls-panel {
            width: 350px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .controls-panel::-webkit-scrollbar {
            width: 8px;
        }

        .controls-panel::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .controls-panel::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #667eea;
            padding-bottom: 15px;
        }

        .header h1 {
            color: #333;
            font-size: 20px;
            margin-bottom: 5px;
        }

        .header p {
            color: #999;
            font-size: 12px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-group label {
            color: #333;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn {
            padding: 10px 12px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            color: #333;
        }

        .btn:hover {
            border-color: #667eea;
            color: #667eea;
            transform: translateY(-2px);
        }

        .btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .color-picker {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .color-btn {
            width: 100%;
            aspect-ratio: 1;
            border: 3px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .color-btn:hover {
            transform: scale(1.1);
        }

        .color-btn.active {
            border-color: #333;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .checkbox-item:hover {
            background: #f5f5f5;
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .checkbox-item label {
            flex: 1;
            cursor: pointer;
            margin: 0;
            font-weight: normal;
            text-transform: none;
            letter-spacing: normal;
            font-size: 13px;
            color: #333;
        }

        .checkbox-item .price {
            color: #667eea;
            font-weight: 600;
            font-size: 12px;
        }

        .cost-summary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: auto;
        }

        .cost-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .cost-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .cost-total {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: 700;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 2px solid rgba(255, 255, 255, 0.3);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-primary {
            flex: 1;
            background: #667eea;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            flex: 1;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 12px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: #f5f5f5;
            transform: translateY(-2px);
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: 18px;
            color: #999;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-text {
            font-size: 12px;
            color: #999;
            text-align: center;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 6px;
        }

        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
            }

            .controls-panel {
                width: 100%;
                max-height: 300px;
            }

            .canvas-container {
                flex: 1;
                min-height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="canvas-container">
            <div id="canvas"></div>
        </div>

        <div class="controls-panel">
            <div class="header">
                <h1>Booth Configurator</h1>
                <p>3D Exhibition Stand Designer</p>
            </div>

            <!-- Dimensions -->
            <div class="control-group">
                <label>Booth Dimensions</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div>
                        <label style="font-size: 12px; font-weight: normal; text-transform: none;">Length (m)</label>
                        <input type="number" id="lengthInput" min="2" max="6" value="3" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                    </div>
                    <div>
                        <label style="font-size: 12px; font-weight: normal; text-transform: none;">Width (m)</label>
                        <input type="number" id="widthInput" min="2" max="5" value="3" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                    </div>
                </div>
            </div>

            <!-- Construction Type -->
            <div class="control-group">
                <label>Construction Type</label>
                <div class="button-group">
                    <button class="btn active" data-construction="standard" data-price="500">Standard (500€)</button>
                    <button class="btn" data-construction="exclusive" data-price="800">Exclusive (800€)</button>
                </div>
            </div>

            <!-- Wall Color -->
            <div class="control-group">
                <label>Wall Color</label>
                <div class="color-picker">
                    <div class="color-btn active" data-color="#FF6B6B" style="background: #FF6B6B;" title="Red"></div>
                    <div class="color-btn" data-color="#4ECDC4" style="background: #4ECDC4;" title="Teal"></div>
                    <div class="color-btn" data-color="#45B7D1" style="background: #45B7D1;" title="Blue"></div>
                    <div class="color-btn" data-color="#FFA07A" style="background: #FFA07A;" title="Orange"></div>
                    <div class="color-btn" data-color="#98D8C8" style="background: #98D8C8;" title="Green"></div>
                    <div class="color-btn" data-color="#F7DC6F" style="background: #F7DC6F;" title="Yellow"></div>
                    <div class="color-btn" data-color="#BB8FCE" style="background: #BB8FCE;" title="Purple"></div>
                    <div class="color-btn" data-color="#FFFFFF" style="background: #FFFFFF; border: 1px solid #ddd;" title="White"></div>
                </div>
            </div>

            <!-- Materials -->
            <div class="control-group">
                <label>Materials</label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="material-plastic" data-material="plastic" data-price="50">
                        <label for="material-plastic">Plastic</label>
                        <span class="price">+50€/m²</span>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="material-wood" data-material="wood" data-price="150">
                        <label for="material-wood">Wood</label>
                        <span class="price">+150€/m²</span>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="material-metal" data-material="metal" data-price="200">
                        <label for="material-metal">Metal</label>
                        <span class="price">+200€/m²</span>
                    </div>
                </div>
            </div>

            <!-- Equipment -->
            <div class="control-group">
                <label>Equipment</label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="equipment-lighting" data-equipment="lighting" data-price="300">
                        <label for="equipment-lighting">Lighting</label>
                        <span class="price">+300€</span>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="equipment-furniture" data-equipment="furniture" data-price="400">
                        <label for="equipment-furniture">Furniture</label>
                        <span class="price">+400€</span>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="equipment-monitor" data-equipment="monitor" data-price="800">
                        <label for="equipment-monitor">Monitor</label>
                        <span class="price">+800€</span>
                    </div>
                </div>
            </div>

            <!-- Cost Summary -->
            <div class="cost-summary">
                <div class="cost-item">
                    <span>Base Booth:</span>
                    <span id="costBase">1500€</span>
                </div>
                <div class="cost-item">
                    <span>Materials:</span>
                    <span id="costMaterials">0€</span>
                </div>
                <div class="cost-item">
                    <span>Equipment:</span>
                    <span id="costEquipment">0€</span>
                </div>
                <div class="cost-total">
                    <span>TOTAL:</span>
                    <span id="costTotal">1500€</span>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button class="btn-primary" onclick="saveConfiguration()">Save Config</button>
                <button class="btn-secondary" onclick="resetConfiguration()">Reset</button>
            </div>

            <div class="info-text">
                💡 Rotate: Mouse drag | Zoom: Scroll wheel | Pan: Right click
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="configurator.js"></script>
</body>
</html>
