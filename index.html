<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Booth Configurator Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            overflow: hidden;
            color: #fff;
        }

        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: rgba(20,20,40,0.95);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 32px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
        }

        .modal-content h2 {
            margin-bottom: 24px;
            font-weight: 600;
            font-size: 28px;
            background: linear-gradient(135deg, #fff, #a0a0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .modal-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .modal-btn {
            padding: 12px 28px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(4px);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .modal-btn.new { background: linear-gradient(135deg, #667eea, #764ba2); border: none; }
        .modal-btn.load { background: linear-gradient(135deg, #11998e, #38ef7d); border: none; }
        .modal-btn:hover { transform: translateY(-2px); filter: brightness(1.05); }

        .app {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .lang-bar {
            position: absolute;
            top: 20px; left: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            padding: 6px 16px;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: 0.2s;
        }

        .lang-btn.active { background: #667eea; box-shadow: 0 2px 8px rgba(102,126,234,0.4); }

        .sidebar {
            width: 380px;
            background: rgba(15,15,30,0.85);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px;
            z-index: 10;
        }

        .sidebar-header {
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .sidebar-header h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #b0b0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .sidebar-header p { font-size: 13px; opacity: 0.7; margin-top: 6px; }

        .category {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            transition: all 0.2s;
        }

        .category-header {
            padding: 14px 18px;
            background: rgba(0,0,0,0.3);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            font-size: 15px;
        }

        .category-content {
            padding: 0 16px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
        }

        .category.active .category-content { max-height: 600px; padding: 16px; }

        .option-group { margin-bottom: 18px; }

        .option-label {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
            color: #aaa;
            display: block;
            margin-bottom: 8px;
        }

        .option-items { display: flex; flex-wrap: wrap; gap: 8px; }

        .option-item {
            background: rgba(30,30,50,0.8);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.1s;
            color: #eee;
        }

        .option-item.selected {
            background: #667eea;
            border-color: #667eea;
            color: white;
            box-shadow: 0 2px 8px rgba(102,126,234,0.3);
        }

        .color-picker {
            width: 100%;
            height: 38px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            cursor: pointer;
        }

        .counter-control {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 6px;
        }

        .counter-btn {
            background: #2c3e66;
            border: none;
            width: 32px; height: 32px;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.1s;
        }

        .counter-btn:hover { background: #1e2a47; }

        .counter-value {
            font-size: 18px;
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }

        .price-section {
            background: linear-gradient(135deg, rgba(102,126,234,0.2), rgba(118,75,162,0.2));
            border-radius: 24px;
            padding: 18px;
            margin-top: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(4px);
        }

        .price-value {
            font-size: 32px;
            font-weight: 800;
            margin: 10px 0;
            background: linear-gradient(135deg, #fff, #d0d0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            color: white;
            transition: 0.2s;
        }

        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); }
        .btn-primary:hover, .btn-secondary:hover { transform: translateY(-2px); filter: brightness(1.05); }

        .canvas-container { flex: 1; position: relative; background: #050b1a; }

        #canvas { width: 100%; height: 100%; display: block; }

        .info-panel {
            position: absolute;
            bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .selected-info {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 12px 18px;
            border-radius: 40px;
            font-size: 13px;
            pointer-events: none;
            border: 2px solid #ffdd66;
            color: #ffdd66;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; max-height: 48%; }
            .app { flex-direction: column; }
            .canvas-container { height: 52%; }
        }
    </style>
</head>
<body>

<div id="modeModal" class="modal">
    <div class="modal-content">
        <h2>✨ Конфигуратор стенда</h2>
        <div class="modal-buttons">
            <button class="modal-btn new" id="newModeBtn">➕ Создать новый</button>
            <button class="modal-btn load" id="loadModeBtn">📂 Загрузить конфиг</button>
        </div>
        <input type="file" id="configFileInput" accept=".json" style="display:none">
    </div>
</div>

<div class="lang-bar">
    <button class="lang-btn active" data-lang="ru">RU</button>
    <button class="lang-btn" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="lv">LV</button>
</div>

<div class="app">
    <div class="sidebar">
        <div class="sidebar-header">
            <h1 id="title">🎨 Booth Designer</h1>
            <p id="subtitle">Клик по объекту — выделить и перетащить</p>
        </div>

        <div class="category active">
            <div class="category-header"><span id="dimLabel">📐 Размеры</span><span>▼</span></div>
            <div class="category-content">
                <div class="option-group"><label id="lenLabel" class="option-label">Длина (м)</label>
                    <div class="option-items" id="lengthOpts">
                        <button class="option-item" data-length="2">2</button>
                        <button class="option-item" data-length="3">3</button>
                        <button class="option-item selected" data-length="4">4</button>
                        <button class="option-item" data-length="5">5</button>
                        <button class="option-item" data-length="6">6</button>
                        <button class="option-item" data-length="8">8</button>
                    </div>
                </div>
                <div class="option-group"><label id="widLabel" class="option-label">Ширина (м)</label>
                    <div class="option-items" id="widthOpts">
                        <button class="option-item" data-width="2">2</button>
                        <button class="option-item selected" data-width="3">3</button>
                        <button class="option-item" data-width="4">4</button>
                        <button class="option-item" data-width="5">5</button>
                        <button class="option-item" data-width="6">6</button>
                    </div>
                </div>
                <div class="option-group"><label id="heiLabel" class="option-label">Высота (м)</label>
                    <div class="option-items" id="heightOpts">
                        <button class="option-item" data-height="2">2</button>
                        <button class="option-item selected" data-height="2.5">2.5</button>
                        <button class="option-item" data-height="3">3</button>
                        <button class="option-item" data-height="3.5">3.5</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="category">
            <div class="category-header"><span id="wallsLabel">🧱 Стены</span><span>▼</span></div>
            <div class="category-content">
                <div class="option-group"><label id="wallsCountLabel" class="option-label">Количество стен</label>
                    <div class="option-items" id="wallsCountOpts">
                        <button class="option-item" data-walls="1">1 стена</button>
                        <button class="option-item" data-walls="2">2 стены</button>
                        <button class="option-item selected" data-walls="3">3 стены</button>
                    </div>
                </div>
                <div class="option-group">
                    <label id="wallColorLabel" class="option-label">Цвет стен</label>
                    <input type="color" id="wallColorPicker" class="color-picker" value="#ffffff">
                </div>
                <div class="option-group"><label id="wallMatLabel" class="option-label">Материал</label>
                    <div class="option-items" id="wallMatOpts">
                        <button class="option-item selected" data-wallmat="plastic">Пластик</button>
                        <button class="option-item" data-wallmat="wood">Дерево</button>
                        <button class="option-item" data-wallmat="metal">Металл</button>
                        <button class="option-item" data-wallmat="fabric">Ткань</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="category">
            <div class="category-header"><span id="floorLabel">🏢 Пол</span><span>▼</span></div>
            <div class="category-content">
                <div class="option-group">
                    <label id="floorColorLabel" class="option-label">Цвет пола</label>
                    <input type="color" id="floorColorPicker" class="color-picker" value="#cccccc">
                </div>
                <div class="option-group"><label id="floorTypeLabel" class="option-label">Тип покрытия</label>
                    <div class="option-items" id="floorTypeOpts">
                        <button class="option-item selected" data-floortype="carpet">Ковролин</button>
                        <button class="option-item" data-floortype="tile">Плитка</button>
                        <button class="option-item" data-floortype="wood">Паркет</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="category">
            <div class="category-header"><span id="furnLabel">🪑 Мебель</span><span>▼</span></div>
            <div class="category-content" id="furnitureUI"></div>
        </div>

        <div class="category">
            <div class="category-header"><span id="lightLabel">💡 Освещение</span><span>▼</span></div>
            <div class="category-content">
                <div class="option-group"><label id="lightTypeLabel" class="option-label">Тип света</label>
                    <div class="option-items" id="lightTypeOpts">
                        <button class="option-item selected" data-lighttype="warm">Тёплый</button>
                        <button class="option-item" data-lighttype="cool">Холодный</button>
                        <button class="option-item" data-lighttype="neutral">Нейтральный</button>
                    </div>
                </div>
                <div class="option-group">
                    <label id="lampCountLabel" class="option-label">Количество ламп</label>
                    <div class="counter-control">
                        <button class="counter-btn" id="lampMinus">-</button>
                        <span class="counter-value" id="lampCountVal">2</span>
                        <button class="counter-btn" id="lampPlus">+</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="category">
            <div class="category-header"><span id="equipLabel">📺 Оборудование</span><span>▼</span></div>
            <div class="category-content" id="equipmentUI"></div>
        </div>

        <div class="price-section">
            <div class="price-label" id="totalLabel">Итоговая стоимость</div>
            <div class="price-value" id="totalPrice">0 €</div>
            <div class="action-buttons">
                <button class="btn btn-primary" id="saveBtn">💾 Сохранить</button>
                <button class="btn btn-secondary" id="resetBtn">🔄 Сброс</button>
                <button class="btn btn-secondary" id="loadConfigBtn">📂 Загрузить JSON</button>
            </div>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="canvas"></canvas>
        <div class="info-panel" id="infoText">
            🖱️ Клик по объекту → выделить+тащить | ЛКМ по фону → вращать | ПКМ → панорама
        </div>
        <div id="selectedInfo" style="display:none;"></div>
    </div>
</div>

<script>
    if (typeof THREE === 'undefined') {
        document.body.innerHTML = '<div style="color:red; padding:50px; font-size:20px;">Ошибка: Three.js не загрузился. Проверьте интернет-соединение.</div>';
        throw new Error('Three.js library not loaded');
    }

    console.log('✅ Three.js loaded successfully');

    const translations = {
        ru: {
            title:"🎨 Booth Designer", subtitle:"Клик по объекту — выделить и перетащить",
            dimLabel:"📐 Размеры", lenLabel:"Длина (м)", widLabel:"Ширина (м)", heiLabel:"Высота (м)",
            wallsLabel:"🧱 Стены", wallsCountLabel:"Количество стен", wallColorLabel:"Цвет стен", wallMatLabel:"Материал",
            floorLabel:"🏢 Пол", floorColorLabel:"Цвет пола", floorTypeLabel:"Тип покрытия",
            furnLabel:"🪑 Мебель", lightLabel:"💡 Освещение", lightTypeLabel:"Тип света", lampCountLabel:"Количество ламп",
            equipLabel:"📺 Оборудование", totalLabel:"Итоговая стоимость",
            plastic:"Пластик", wood:"Дерево", metal:"Металл", fabric:"Ткань",
            carpet:"Ковролин", tile:"Плитка", parquet:"Паркет",
            warm:"Тёплый", cool:"Холодный", neutral:"Нейтральный",
            table:"Стол", chair:"Стул", counter:"Стойка", shelf:"Полка",
            monitor:"Монитор", speaker:"Динамик", camera:"Камера", banner:"Баннер",
            oneWall:"1 стена", twoWalls:"2 стены", threeWalls:"3 стены"
        },
        en: {
            title:"🎨 Booth Designer", subtitle:"Click object to select & drag",
            dimLabel:"📐 Dimensions", lenLabel:"Length (m)", widLabel:"Width (m)", heiLabel:"Height (m)",
            wallsLabel:"🧱 Walls", wallsCountLabel:"Number of walls", wallColorLabel:"Wall Color", wallMatLabel:"Material",
            floorLabel:"🏢 Floor", floorColorLabel:"Floor Color", floorTypeLabel:"Floor Type",
            furnLabel:"🪑 Furniture", lightLabel:"💡 Lighting", lightTypeLabel:"Light Type", lampCountLabel:"Lamps",
            equipLabel:"📺 Equipment", totalLabel:"Total Price",
            plastic:"Plastic", wood:"Wood", metal:"Metal", fabric:"Fabric",
            carpet:"Carpet", tile:"Tile", parquet:"Parquet",
            warm:"Warm", cool:"Cool", neutral:"Neutral",
            table:"Table", chair:"Chair", counter:"Counter", shelf:"Shelf",
            monitor:"Monitor", speaker:"Speaker", camera:"Camera", banner:"Banner",
            oneWall:"1 wall", twoWalls:"2 walls", threeWalls:"3 walls"
        },
        lv: {
            title:"🎨 Stenda Dizainers", subtitle:"Klikšķis uz objekta — izvēlēties un vilkt",
            dimLabel:"📐 Izmēri", lenLabel:"Garums (m)", widLabel:"Platums (m)", heiLabel:"Augstums (m)",
            wallsLabel:"🧱 Sienas", wallsCountLabel:"Sienu skaits", wallColorLabel:"Sienu krāsa", wallMatLabel:"Materiāls",
            floorLabel:"🏢 Grīda", floorColorLabel:"Grīdas krāsa", floorTypeLabel:"Grīdas tips",
            furnLabel:"🪑 Mēbeles", lightLabel:"💡 Apgaismojums", lightTypeLabel:"Gaismas tips", lampCountLabel:"Lampu skaits",
            equipLabel:"📺 Aprīkojums", totalLabel:"Kopējā cena",
            plastic:"Plastmasa", wood:"Koks", metal:"Metāls", fabric:"Audums",
            carpet:"Paklājs", tile:"Flīzes", parquet:"Parkets",
            warm:"Silts", cool:"Vēss", neutral:"Neitrāls",
            table:"Galds", chair:"Krēsls", counter:"Skaitītājs", shelf:"Plaukts",
            monitor:"Monitors", speaker:"Skaļrunis", camera:"Kamera", banner:"Baneris",
            oneWall:"1 siena", twoWalls:"2 sienas", threeWalls:"3 sienas"
        }
    };

    let currentLang = 'ru';

    function applyLanguage() {
        const t = translations[currentLang];
        document.getElementById('title').innerText = t.title;
        document.getElementById('subtitle').innerText = t.subtitle;
        document.getElementById('dimLabel').innerHTML = t.dimLabel;
        document.getElementById('lenLabel').innerText = t.lenLabel;
        document.getElementById('widLabel').innerText = t.widLabel;
        document.getElementById('heiLabel').innerText = t.heiLabel;
        document.getElementById('wallsLabel').innerHTML = t.wallsLabel;
        document.getElementById('wallsCountLabel').innerText = t.wallsCountLabel;
        document.getElementById('wallColorLabel').innerText = t.wallColorLabel;
        document.getElementById('wallMatLabel').innerText = t.wallMatLabel;
        document.getElementById('floorLabel').innerHTML = t.floorLabel;
        document.getElementById('floorColorLabel').innerText = t.floorColorLabel;
        document.getElementById('floorTypeLabel').innerText = t.floorTypeLabel;
        document.getElementById('furnLabel').innerHTML = t.furnLabel;
        document.getElementById('lightLabel').innerHTML = t.lightLabel;
        document.getElementById('lightTypeLabel').innerText = t.lightTypeLabel;
        document.getElementById('lampCountLabel').innerText = t.lampCountLabel;
        document.getElementById('equipLabel').innerHTML = t.equipLabel;
        document.getElementById('totalLabel').innerText = t.totalLabel;
        document.querySelectorAll('[data-wallmat]').forEach(btn => { if(t[btn.dataset.wallmat]) btn.innerText = t[btn.dataset.wallmat]; });
        document.querySelectorAll('[data-floortype]').forEach(btn => { if(t[btn.dataset.floortype]) btn.innerText = t[btn.dataset.floortype]; });
        document.querySelectorAll('[data-lighttype]').forEach(btn => { if(t[btn.dataset.lighttype]) btn.innerText = t[btn.dataset.lighttype]; });
        const wallsCountBtns = document.querySelectorAll('[data-walls]');
        if(wallsCountBtns.length===3){ wallsCountBtns[0].innerText = t.oneWall; wallsCountBtns[1].innerText = t.twoWalls; wallsCountBtns[2].innerText = t.threeWalls; }
        updateFurnitureUITexts();
        updateEquipmentUITexts();
    }

    function updateFurnitureUITexts() {
        const t = translations[currentLang];
        ['table','chair','counter','shelf'].forEach(type => {
            const label = document.querySelector(`#furnitureUI .option-label[data-type="${type}"]`);
            if(label && t[type]) label.innerText = t[type];
        });
    }

    function updateEquipmentUITexts() {
        const t = translations[currentLang];
        ['monitor','speaker','camera','banner'].forEach(type => {
            const label = document.querySelector(`#equipmentUI .option-label[data-type="${type}"]`);
            if(label && t[type]) label.innerText = t[type];
        });
    }

    let config = {
        dims: { length:4, width:3, height:2.5 },
        wallsCount: 3,
        wallColor: '#ffffff',
        wallMaterial: 'plastic',
        floorColor: '#cccccc',
        floorType: 'carpet',
        lightType: 'warm',
        lampCount: 2,
        furniture: { table:0, chair:0, counter:0, shelf:0 },
        equipment: { monitor:0, speaker:0, camera:0, banner:0 },
        items: []
    };
    let nextId = 1;
    const prices = {
        baseSqm: 120,
        wallMat: { plastic:30, wood:80, metal:110, fabric:45 },
        floor: { carpet:25, tile:35, wood:55 },
        furniture: { table:180, chair:85, counter:320, shelf:210 },
        equipment: { monitor:650, speaker:220, camera:480, banner:130 },
        lamp: 50
    };

    let scene, camera, renderer, boothGroup;
    let orbitX = 0.8, orbitY = 0.5, radius = 7;
    let center = new THREE.Vector3(0, 1.2, 0);
    let panX = 0, panY = 0, panZ = 0;

    let isOrbiting = false;
    let isPanning = false;
    let isDraggingObj = false;
    let lastMousePos = { x:0, y:0 };

    let selectedObj = null;
    let selectedId = null;
    let dragPlane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);
    let dragOffsetVec = new THREE.Vector3();

    let itemMap = new Map();
    let lamps = [];
    let originalMaterials = new Map();

    function createWoodTexture() {
        const canvas = document.createElement('canvas'); canvas.width=512; canvas.height=512;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#c7a47b'; ctx.fillRect(0,0,512,512);
        for(let i=0;i<200;i++){
            ctx.beginPath(); ctx.moveTo(i*20,0); ctx.lineTo(i*20+10,512); ctx.lineTo(i*20-10,512);
            ctx.fillStyle='#a57c52'; ctx.fill();
        }
        const tex = new THREE.CanvasTexture(canvas);
        tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(2,2);
        return tex;
    }

    function createTileTexture() {
        const canvas = document.createElement('canvas'); canvas.width=512; canvas.height=512;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle='#aaaaaa'; ctx.fillRect(0,0,512,512);
        ctx.strokeStyle='#666'; ctx.lineWidth=10;
        for(let i=0;i<8;i++){
            ctx.beginPath(); ctx.moveTo(i*64,0); ctx.lineTo(i*64,512); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,i*64); ctx.lineTo(512,i*64); ctx.stroke();
        }
        const tex = new THREE.CanvasTexture(canvas);
        tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(4,4);
        return tex;
    }

    function createParquetTexture() {
        const canvas = document.createElement('canvas'); canvas.width=512; canvas.height=512;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle='#b87c4f'; ctx.fillRect(0,0,512,512);
        for(let i=0;i<20;i++){ ctx.fillStyle='#9b5e2e'; ctx.fillRect(i*50,0,20,512); }
        const tex = new THREE.CanvasTexture(canvas);
        tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(4,4);
        return tex;
    }

    function create3DObject(type, id, x, z) {

            case 'counter': obj = createCounter(x, z); break;
            case 'shelf':   obj = createShelf(x, z); break;
            case 'monitor': obj = createMonitor(x, z); break;
            case 'speaker': obj = createSpeaker(x, z); break;
            case 'camera':  obj = createCamera(x, z); break;
            case 'banner':  obj = createBanner(x, z); break;
        }

        if(obj) {
            obj.userData.itemId = id;
            obj.userData.itemType = type;
            obj.userData.isSelectableGroup = true;
            obj.traverse(child => {
                if(child.isMesh) {
                    child.userData.selectableGroupId = id;
                    if(child.material) {
                        originalMaterials.set(child.uuid, {
                            color: child.material.color ? child.material.color.clone() : null,
                            emissive: child.material.emissive ? child.material.emissive.clone() : null
                        });
                    }
                }
            });
        }
        return obj;
    }

    function highlightObject(obj, highlight) {
        if(!obj) return;
        obj.traverse(child => {
            if(child.isMesh && child.material) {
                if(highlight) {
                    child.material.emissive = new THREE.Color(0x334400);
                    child.material.color.setHex(0xffdd66);
                } else {
                    const orig = originalMaterials.get(child.uuid);
                    if(orig) {
                        if(orig.color) child.material.color.copy(orig.color);
                        if(orig.emissive) child.material.emissive.copy(orig.emissive);
                        else child.material.emissive = new THREE.Color(0x000000);
                    }
                }
            }
        });
    }

    function rebuildScene() {
        while(boothGroup.children.length) boothGroup.remove(boothGroup.children[0]);
        itemMap.clear();
        originalMaterials.clear();

        const { length, width, height } = config.dims;

        const floorMat = getFloorMaterial();
        const floorPlane = new THREE.Mesh(new THREE.PlaneGeometry(length, width), floorMat);
        floorPlane.rotation.x = -Math.PI/2; floorPlane.receiveShadow = true;
        boothGroup.add(floorPlane);

        const wallMat = getWallMaterial();
        const backWall = new THREE.Mesh(new THREE.BoxGeometry(length, height, 0.1), wallMat);
        backWall.position.set(0, height/2, -width/2); backWall.castShadow=true; backWall.receiveShadow=true;
        boothGroup.add(backWall);

        if(config.wallsCount >= 2) {
            const leftWall = new THREE.Mesh(new THREE.BoxGeometry(0.1, height, width), wallMat);
            leftWall.position.set(-length/2, height/2, 0); leftWall.castShadow=true; leftWall.receiveShadow=true;
            boothGroup.add(leftWall);
        }
        if(config.wallsCount >= 3) {
            const rightWall = new THREE.Mesh(new THREE.BoxGeometry(0.1, height, width), wallMat);
            rightWall.position.set(length/2, height/2, 0); rightWall.castShadow=true; rightWall.receiveShadow=true;
            boothGroup.add(rightWall);
        }

        config.items.forEach(item => {
            const obj = create3DObject(item.type, item.id, item.posX, item.posZ);
            if(obj) { boothGroup.add(obj); itemMap.set(item.id, obj); }
        });

        lamps.forEach(l => scene.remove(l)); lamps = [];
        const lampColor = config.lightType==='warm' ? 0xffaa66 : (config.lightType==='cool' ? 0x88aaff : 0xffffff);
        for(let i=0; i<config.lampCount; i++) {
            const lamp = new THREE.PointLight(lampColor, 0.8, 15);
            lamp.castShadow = true;
            lamp.shadow.mapSize.width = 512;
            lamp.shadow.mapSize.height = 512;
            const angle = (i / Math.max(1, config.lampCount)) * Math.PI * 2;
            const lampX = Math.cos(angle)*3.5;
            const lampZ = Math.sin(angle)*3.5;
            lamp.position.set(lampX, 2.8, lampZ);
            scene.add(lamp);
            lamps.push(lamp);
        }

        updatePrice();
    }

    function updatePrice() {
        const { length, width, height } = config.dims;
        const area = length * width;
        let total = prices.baseSqm * area;
        total += prices.wallMat[config.wallMaterial] * (2*(length+width)*height);
        total += prices.floor[config.floorType] * area;
        for(let [k,v] of Object.entries(config.furniture)) total += v * prices.furniture[k];
        for(let [k,v] of Object.entries(config.equipment)) total += v * prices.equipment[k];
        total += config.lampCount * prices.lamp;
        document.getElementById('totalPrice').innerHTML = `${Math.round(total).toLocaleString()} €`;
    }

    function getCanvasRay(event) {
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(
            ((event.clientX - rect.left) / rect.width) * 2 - 1,
            -((event.clientY - rect.top) / rect.height) * 2 + 1
        );
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);
        return raycaster;
    }

    function getPlaneIntersect(event, plane) {
        const raycaster = getCanvasRay(event);
        const point = new THREE.Vector3();
        if(raycaster.ray.intersectPlane(plane, point)) return point;
        return null;
    }

    function trySelectObject(event) {
        const raycaster = getCanvasRay(event);
        const allMeshes = [];
        itemMap.forEach(obj => {
            obj.traverse(child => { if(child.isMesh) allMeshes.push(child); });
        });

        const intersects = raycaster.intersectObjects(allMeshes, false);
        if(intersects.length > 0) {
            const hitMesh = intersects[0].object;
            const groupId = hitMesh.userData.selectableGroupId;
            if(groupId) {
                const rootObj = itemMap.get(groupId);
                if(rootObj) return rootObj;
            }
        }
        return null;
    }

    function initThree() {
        const canvas = document.getElementById('canvas');
        const w = canvas.clientWidth, h = canvas.clientHeight;

        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.015);

        camera = new THREE.PerspectiveCamera(45, w/h, 0.1, 100);

        renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
        renderer.setSize(w, h);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        const starGeometry = new THREE.BufferGeometry();
        const starPos = [];
        for(let i=0; i<1200; i++) {
            starPos.push((Math.random()-0.5)*200, (Math.random()-0.5)*100, (Math.random()-0.5)*80-40);
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
        scene.add(new THREE.Points(starGeometry, new THREE.PointsMaterial({ color:0xffffff, size:0.08 })));

        scene.add(new THREE.AmbientLight(0x404060, 0.5));
        const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.2);
        mainLight.position.set(5,10,5); mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 1024; mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);
        
        const pointLight = new THREE.PointLight(0x4466cc, 0.3);
        pointLight.position.set(-2,3,-3);
        scene.add(pointLight);

        boothGroup = new THREE.Group();
        scene.add(boothGroup);

        window.addEventListener('resize', onResize);
        canvas.addEventListener('mousedown', onMouseDown);
        canvas.addEventListener('mousemove', onMouseMove);
        canvas.addEventListener('mouseup', onMouseUp);
        canvas.addEventListener('wheel', onWheel, { passive: false });
        canvas.addEventListener('contextmenu', e => e.preventDefault());

        animate();
    }

    function updateCamera() {
        const x = center.x + panX + radius * Math.sin(orbitX) * Math.cos(orbitY);
        const y = center.y + panY + radius * Math.sin(orbitY);
        const z = center.z + panZ + radius * Math.cos(orbitX) * Math.cos(orbitY);
        camera.position.set(x, y, z);
        camera.lookAt(center.x + panX, center.y + panY, center.z + panZ);
    }

    function onMouseDown(e) {
        e.preventDefault();

        if(e.button === 0) {
            const hit = trySelectObject(e);
            if(hit) {
                if(selectedObj && selectedObj !== hit) highlightObject(selectedObj, false);
                selectedObj = hit;
                selectedId = hit.userData.itemId;
                isDraggingObj = true;
                dragPlane.set(new THREE.Vector3(0,1,0), -selectedObj.position.y);
                const p = getPlaneIntersect(e, dragPlane);
                if(p) dragOffsetVec.copy(selectedObj.position).sub(p);
                highlightObject(selectedObj, true);
                document.getElementById('selectedInfo').innerText = `✓ Выбран: ${selectedObj.userData.itemType}`;
                document.getElementById('selectedInfo').style.display = 'block';
                return;
            } else {
                if(selectedObj) {
                    highlightObject(selectedObj, false);
                    selectedObj = null; selectedId = null;
                    document.getElementById('selectedInfo').style.display = 'none';
                }
                isOrbiting = true;
            }
        } else if(e.button === 2) {
            isPanning = true;
        }

        lastMousePos = { x: e.clientX, y: e.clientY };
    }

    function onMouseMove(e) {
        if(isDraggingObj && selectedObj) {
            const p = getPlaneIntersect(e, dragPlane);
            if(p) {
                let newPos = p.clone().add(dragOffsetVec);
                const limitX = (config.dims.length / 2) - 0.5;
                const limitZ = (config.dims.width / 2) - 0.5;
                newPos.x = Math.max(-limitX, Math.min(limitX, newPos.x));
                newPos.z = Math.max(-limitZ, Math.min(limitZ, newPos.z));
                newPos.y = selectedObj.position.y;
                selectedObj.position.copy(newPos);
                const item = config.items.find(i => i.id === selectedId);
                if(item) { item.posX = newPos.x; item.posZ = newPos.z; }
            }
            return;
        }

        if(!isOrbiting && !isPanning) return;

        const dx = e.clientX - lastMousePos.x;
        const dy = e.clientY - lastMousePos.y;

        if(isOrbiting) {
            orbitX += dx * 0.008;
            orbitY += dy * 0.008;
            orbitY = Math.max(0.15, Math.min(Math.PI/2.1, orbitY));
        } else if(isPanning) {
            panX -= dx * 0.01;
            panY += dy * 0.01;
        }

        lastMousePos = { x: e.clientX, y: e.clientY };
    }

    function onMouseUp(e) {
        isDraggingObj = false;
        isOrbiting = false;
        isPanning = false;
    }

    function onWheel(e) {
        e.preventDefault();
        radius += e.deltaY * 0.01;
        radius = Math.max(3.0, Math.min(16, radius));
    }

    function onResize() {
        const canvas = document.getElementById('canvas');
        const w = canvas.clientWidth, h = canvas.clientHeight;
        camera.aspect = w/h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    }

    function animate() {
        requestAnimationFrame(animate);
        updateCamera();
        renderer.render(scene, camera);
    }

    function addItem(type, category) {
        const limitX = (config.dims.length/2) - 0.8;
        const limitZ = (config.dims.width/2) - 0.8;
        const posX = (Math.random()-0.5) * limitX * 1.6;
        const posZ = (Math.random()-0.5) * limitZ * 1.6;
        const id = `${category}_${type}_${nextId++}`;
        config.items.push({ id, type, category, posX, posZ });
    }

    function removeLastItem(type, category) {
        for(let i = config.items.length-1; i >= 0; i--) {
            if(config.items[i].type === type && config.items[i].category === category) {
                config.items.splice(i, 1); break;
            }
        }
    }

    function changeFurniture(type, delta) {
        let newVal = config.furniture[type] + delta;
        if(newVal < 0) newVal = 0; if(newVal > 20) newVal = 20;
        if(newVal > config.furniture[type]) for(let i=0; i<newVal-config.furniture[type]; i++) addItem(type,'furniture');
        else if(newVal < config.furniture[type]) for(let i=0; i<config.furniture[type]-newVal; i++) removeLastItem(type,'furniture');
        config.furniture[type] = newVal;
        document.getElementById(`furn_${type}`).innerText = newVal;
        rebuildScene();
    }

    function changeEquipment(type, delta) {
        let newVal = config.equipment[type] + delta;
        if(newVal < 0) newVal = 0; if(newVal > 20) newVal = 20;
        if(newVal > config.equipment[type]) for(let i=0; i<newVal-config.equipment[type]; i++) addItem(type,'equipment');
        else if(newVal < config.equipment[type]) for(let i=0; i<config.equipment[type]-newVal; i++) removeLastItem(type,'equipment');
        config.equipment[type] = newVal;
        document.getElementById(`equip_${type}`).innerText = newVal;
        rebuildScene();
    }

    function syncUI() {
        document.querySelectorAll('[data-length]').forEach(btn => btn.classList.remove('selected'));
        document.querySelector(`[data-length="${config.dims.length}"]`).classList.add('selected');
        document.querySelectorAll('[data-width]').forEach(btn => btn.classList.remove('selected'));
        document.querySelector(`[data-width="${config.dims.width}"]`).classList.add('selected');
        document.querySelectorAll('[data-height]').forEach(btn => btn.classList.remove('selected'));
        document.querySelector(`[data-height="${config.dims.height}"]`).classList.add('selected');
        document.querySelectorAll('[data-walls]').forEach(btn => btn.classList.remove('selected'));
        document.querySelector(`[data-walls="${config.wallsCount}"]`).classList.add('selected');
        document.getElementById('wallColorPicker').value = config.wallColor;
        document.getElementById('floorColorPicker').value = config.floorColor;
        document.querySelectorAll('[data-wallmat]').forEach(btn => btn.classList.remove('selected'));
        document.querySelector(`[data-wallmat="${config.wallMaterial}"]`).classList.add('selected');
        document.querySelectorAll('[data-floortype]').forEach(btn => btn.classList.remove('selected'));
        document.querySelector(`[data-floortype="${config.floorType}"]`).classList.add('selected');
        document.querySelectorAll('[data-lighttype]').forEach(btn => btn.classList.remove('selected'));
        document.querySelector(`[data-lighttype="${config.lightType}"]`).classList.add('selected');
        document.getElementById('lampCountVal').innerText = config.lampCount;
        buildFurnitureUI();
        buildEquipmentUI();
    }

    function resetConfig() {
        if(selectedObj) { highlightObject(selectedObj, false); selectedObj = null; selectedId = null; document.getElementById('selectedInfo').style.display = 'none'; }
        config = {
            dims: { length:4, width:3, height:2.5 },
            wallsCount:3, wallColor:'#ffffff', wallMaterial:'plastic',
            floorColor:'#cccccc', floorType:'carpet', lightType:'warm', lampCount:2,
            furniture: { table:0, chair:0, counter:0, shelf:0 },
            equipment: { monitor:0, speaker:0, camera:0, banner:0 },
            items: []
        };
        nextId = 1;
        syncUI();
        rebuildScene();
    }

    function saveToFile() {
        const dataStr = JSON.stringify(config, null, 2);
        const blob = new Blob([dataStr], { type:'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'booth_config.json'; a.click();
        URL.revokeObjectURL(url);
        alert('Конфигурация сохранена');
    }

    function loadFromFile(file) {
        const reader = new FileReader();
        reader.onload = e => {
            try {
                config = JSON.parse(e.target.result);
                syncUI();
                rebuildScene();
                document.getElementById('modeModal').style.display = 'none';
            } catch(err) { alert('Ошибка загрузки файла'); }
        };
        reader.readAsText(file);
    }

    function attachEvents() {
        document.getElementById('lengthOpts').querySelectorAll('[data-length]').forEach(btn => btn.addEventListener('click', e => { config.dims.length = parseFloat(e.target.dataset.length); rebuildScene(); syncUI(); }));
        document.getElementById('widthOpts').querySelectorAll('[data-width]').forEach(btn => btn.addEventListener('click', e => { config.dims.width = parseFloat(e.target.dataset.width); rebuildScene(); syncUI(); }));
        document.getElementById('heightOpts').querySelectorAll('[data-height]').forEach(btn => btn.addEventListener('click', e => { config.dims.height = parseFloat(e.target.dataset.height); rebuildScene(); syncUI(); }));
        document.getElementById('wallsCountOpts').querySelectorAll('[data-walls]').forEach(btn => btn.addEventListener('click', e => { config.wallsCount = parseInt(e.target.dataset.walls); rebuildScene(); syncUI(); }));
        document.getElementById('wallColorPicker').addEventListener('change', e => { config.wallColor = e.target.value; rebuildScene(); });
        document.getElementById('floorColorPicker').addEventListener('change', e => { config.floorColor = e.target.value; rebuildScene(); });
        document.getElementById('wallMatOpts').querySelectorAll('[data-wallmat]').forEach(btn => btn.addEventListener('click', e => { config.wallMaterial = e.target.dataset.wallmat; rebuildScene(); syncUI(); }));
        document.getElementById('floorTypeOpts').querySelectorAll('[data-floortype]').forEach(btn => btn.addEventListener('click', e => { config.floorType = e.target.dataset.floortype; rebuildScene(); syncUI(); }));
        document.getElementById('lightTypeOpts').querySelectorAll('[data-lighttype]').forEach(btn => btn.addEventListener('click', e => { config.lightType = e.target.dataset.lighttype; rebuildScene(); syncUI(); }));
        document.getElementById('lampPlus').addEventListener('click', () => { if(config.lampCount < 8){ config.lampCount++; document.getElementById('lampCountVal').innerText = config.lampCount; rebuildScene(); } });
        document.getElementById('lampMinus').addEventListener('click', () => { if(config.lampCount > 0){ config.lampCount--; document.getElementById('lampCountVal').innerText = config.lampCount; rebuildScene(); } });
        document.getElementById('saveBtn').addEventListener('click', saveToFile);
        document.getElementById('resetBtn').addEventListener('click', resetConfig);
        document.getElementById('loadConfigBtn').addEventListener('click', () => document.getElementById('configFileInput').click());
        document.getElementById('configFileInput').addEventListener('change', e => { if(e.target.files[0]) loadFromFile(e.target.files[0]); });
        document.querySelectorAll('.category-header').forEach(h => h.addEventListener('click', () => h.parentElement.classList.toggle('active')));
        document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => {
            currentLang = btn.dataset.lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            applyLanguage();
            syncUI();
        }));
    }

    function startNew() {
        document.getElementById('modeModal').style.display = 'none';
        initThree();
        attachEvents();
        syncUI();
        rebuildScene();
        applyLanguage();
    }

    document.getElementById('newModeBtn').addEventListener('click', startNew);
    document.getElementById('loadModeBtn').addEventListener('click', () => {
        document.getElementById('configFileInput').click();
        document.getElementById('configFileInput').onchange = (e) => {
            if(e.target.files[0]) { loadFromFile(e.target.files[0]); initThree(); attachEvents(); applyLanguage(); }
        };
    });

    startNew();
</script>
</body>
</html>
