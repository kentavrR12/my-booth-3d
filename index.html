<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ultra Premium 3D Booth Configurator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0f0c29 100%);
            overflow: hidden;
            color: #fff;
        }

        .app {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 420px;
            background: rgba(20, 24, 50, 0.7);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 28px 24px;
            z-index: 10;
            box-shadow: inset -1px 0 0 rgba(255,255,255,0.05);
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
        }

        .sidebar::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.2);
        }

        .sidebar-header {
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #b0b0ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 6px;
        }

        .sidebar-header p {
            font-size: 12px;
            opacity: 0.6;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .category {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .category:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .category-header {
            padding: 16px 18px;
            background: rgba(0, 0, 0, 0.2);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.3px;
            transition: all 0.2s;
        }

        .category-header:hover {
            background: rgba(0, 0, 0, 0.3);
        }

        .category-header span:last-child {
            font-size: 12px;
            opacity: 0.6;
            transition: transform 0.3s;
        }

        .category.active .category-header span:last-child {
            transform: rotate(180deg);
        }

        .category-content {
            padding: 0 18px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .category.active .category-content {
            max-height: 800px;
            padding: 18px;
        }

        .option-group {
            margin-bottom: 20px;
        }

        .option-label {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1.2px;
            color: rgba(255, 255, 255, 0.5);
            display: block;
            margin-bottom: 10px;
        }

        .option-items {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .option-item {
            background: rgba(100, 120, 180, 0.1);
            border: 1.5px solid rgba(100, 120, 180, 0.3);
            padding: 8px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: rgba(255, 255, 255, 0.8);
        }

        .option-item:hover {
            background: rgba(100, 120, 180, 0.2);
            border-color: rgba(100, 120, 180, 0.5);
            transform: translateY(-2px);
        }

        .option-item.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.35);
            font-weight: 600;
        }

        .color-picker {
            width: 100%;
            height: 44px;
            background: rgba(0, 0, 0, 0.3);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .color-picker:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.4);
        }

        .counter-control {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .counter-btn {
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.4);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .counter-btn:hover {
            background: rgba(102, 126, 234, 0.4);
            border-color: rgba(102, 126, 234, 0.6);
            transform: scale(1.05);
        }

        .counter-value {
            font-size: 16px;
            font-weight: 700;
            min-width: 30px;
            text-align: center;
            color: #ffffff;
        }

        .price-section {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%);
            border-radius: 20px;
            padding: 20px;
            margin-top: 24px;
            text-align: center;
            border: 1.5px solid rgba(102, 126, 234, 0.3);
            backdrop-filter: blur(8px);
        }

        .price-label {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1.2px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
        }

        .price-value {
            font-size: 36px;
            font-weight: 800;
            margin: 12px 0;
            background: linear-gradient(135deg, #ffffff 0%, #d0d0ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -1px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        .btn {
            flex: 1;
            min-width: 100px;
            padding: 10px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 12px;
            border: none;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
            background: linear-gradient(135deg, #7a8eea 0%, #8a5bb2 100%);
        }

        .canvas-container {
            flex: 1;
            position: relative;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
            overflow: hidden;
        }

        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .info-panel {
            position: absolute;
            bottom: 24px;
            right: 24px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            padding: 10px 16px;
            border-radius: 50px;
            font-size: 11px;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .selected-info {
            position: absolute;
            top: 24px;
            right: 24px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 13px;
            pointer-events: none;
            border: 2px solid rgba(255, 221, 102, 0.6);
            color: #ffdd66;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .lang-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            gap: 6px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(12px);
            padding: 6px 8px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .lang-btn {
            background: transparent;
            border: 1px solid transparent;
            color: rgba(255, 255, 255, 0.6);
            padding: 6px 12px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 11px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .lang-btn:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .lang-btn.active {
            background: rgba(102, 126, 234, 0.3);
            border-color: rgba(102, 126, 234, 0.5);
            color: white;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                max-height: 50%;
                padding: 20px;
            }

            .app {
                flex-direction: column;
            }

            .canvas-container {
                height: 50%;
            }

            .sidebar-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

<div class="lang-bar">
    <button class="lang-btn active" data-lang="ru">RU</button>
    <button class="lang-btn" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="lv">LV</button>
</div>

<div class="app">
    <div class="sidebar">
        <div class="sidebar-header">
            <h1 id="title">✨ Booth Designer</h1>
            <p id="subtitle">Ultra Premium Edition</p>
        </div>

        <div class="category active">
            <div class="category-header"><span id="dimLabel">📐 Размеры</span><span>▼</span></div>
            <div class="category-content">
                <div class="option-group">
                    <label id="lenLabel" class="option-label">Длина (м)</label>
                    <div class="option-items" id="lengthOpts">
                        <button class="option-item" data-length="2">2</button>
                        <button class="option-item" data-length="3">3</button>
                        <button class="option-item selected" data-length="4">4</button>
                        <button class="option-item" data-length="5">5</button>
                        <button class="option-item" data-length="6">6</button>
                        <button class="option-item" data-length="8">8</button>
                    </div>
                </div>
                <div class="option-group">
                    <label id="widLabel" class="option-label">Ширина (м)</label>
                    <div class="option-items" id="widthOpts">
                        <button class="option-item" data-width="2">2</button>
                        <button class="option-item selected" data-width="3">3</button>
                        <button class="option-item" data-width="4">4</button>
                        <button class="option-item" data-width="5">5</button>
                        <button class="option-item" data-width="6">6</button>
                    </div>
                </div>
                <div class="option-group">
                    <label id="heiLabel" class="option-label">Высота (м)</label>
                    <div class="option-items" id="heightOpts">
                        <button class="option-item" data-height="2">2</button>
                        <button class="option-item selected" data-height="2.5">2.5</button>
                        <button class="option-item" data-height="3">3</button>
                        <button class="option-item" data-height="3.5">3.5</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="category">
            <div class="category-header"><span id="wallsLabel">🧱 Стены</span><span>▼</span></div>
            <div class="category-content">
                <div class="option-group">
                    <label id="wallsCountLabel" class="option-label">Количество стен</label>
                    <div class="option-items" id="wallsCountOpts">
                        <button class="option-item" data-walls="1">1 стена</button>
                        <button class="option-item" data-walls="2">2 стены</button>
                        <button class="option-item selected" data-walls="3">3 стены</button>
                    </div>
                </div>
                <div class="option-group">
                    <label id="wallColorLabel" class="option-label">Цвет стен</label>
                    <input type="color" id="wallColorPicker" class="color-picker" value="#ffffff">
                </div>
                <div class="option-group">
                    <label id="wallMatLabel" class="option-label">Материал</label>
                    <div class="option-items" id="wallMatOpts">
                        <button class="option-item selected" data-wallmat="plastic">Пластик</button>
                        <button class="option-item" data-wallmat="wood">Дерево</button>
                        <button class="option-item" data-wallmat="metal">Металл</button>
                        <button class="option-item" data-wallmat="fabric">Ткань</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="category">
            <div class="category-header"><span id="floorLabel">🏢 Пол</span><span>▼</span></div>
            <div class="category-content">
                <div class="option-group">
                    <label id="floorColorLabel" class="option-label">Цвет пола</label>
                    <input type="color" id="floorColorPicker" class="color-picker" value="#cccccc">
                </div>
                <div class="option-group">
                    <label id="floorTypeLabel" class="option-label">Тип покрытия</label>
                    <div class="option-items" id="floorTypeOpts">
                        <button class="option-item selected" data-floortype="carpet">Ковролин</button>
                        <button class="option-item" data-floortype="tile">Плитка</button>
                        <button class="option-item" data-floortype="wood">Паркет</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="category">
            <div class="category-header"><span id="furnLabel">🪑 Мебель</span><span>▼</span></div>
            <div class="category-content" id="furnitureUI"></div>
        </div>

        <div class="category">
            <div class="category-header"><span id="lightLabel">💡 Освещение</span><span>▼</span></div>
            <div class="category-content">
                <div class="option-group">
                    <label id="lightTypeLabel" class="option-label">Тип света</label>
                    <div class="option-items" id="lightTypeOpts">
                        <button class="option-item selected" data-lighttype="warm">Тёплый</button>
                        <button class="option-item" data-lighttype="cool">Холодный</button>
                        <button class="option-item" data-lighttype="neutral">Нейтральный</button>
                    </div>
                </div>
                <div class="option-group">
                    <label id="lampCountLabel" class="option-label">Количество ламп</label>
                    <div class="counter-control">
                        <button class="counter-btn" id="lampMinus">−</button>
                        <span class="counter-value" id="lampCountVal">2</span>
                        <button class="counter-btn" id="lampPlus">+</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="category">
            <div class="category-header"><span id="equipLabel">📺 Оборудование</span><span>▼</span></div>
            <div class="category-content" id="equipmentUI"></div>
        </div>

        <div class="price-section">
            <div class="price-label" id="totalLabel">Итоговая стоимость</div>
            <div class="price-value" id="totalPrice">0 €</div>
            <div class="action-buttons">
                <button class="btn btn-primary" id="saveBtn">💾 Сохранить</button>
                <button class="btn" id="resetBtn">🔄 Сброс</button>
            </div>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="canvas"></canvas>
        <div class="info-panel" id="infoText">
            🖱️ Клик на объект → выделить | ПКМ → панорама | Колесо → зум
        </div>
        <div id="selectedInfo" style="display:none;"></div>
    </div>
</div>

<input type="file" id="configFileInput" accept=".json" style="display:none">

<script>
    if (typeof THREE === 'undefined') {
        document.body.innerHTML = '<div style="color:red; padding:50px; font-size:20px;">Ошибка: Three.js не загрузился.</div>';
        throw new Error('Three.js not loaded');
    }

    const translations = {
        ru: {
            title:"✨ Booth Designer", subtitle:"Ultra Premium Edition",
            dimLabel:"📐 Размеры", lenLabel:"Длина (м)", widLabel:"Ширина (м)", heiLabel:"Высота (м)",
            wallsLabel:"🧱 Стены", wallsCountLabel:"Количество стен", wallColorLabel:"Цвет стен", wallMatLabel:"Материал",
            floorLabel:"🏢 Пол", floorColorLabel:"Цвет пола", floorTypeLabel:"Тип покрытия",
            furnLabel:"🪑 Мебель", lightLabel:"💡 Освещение", lightTypeLabel:"Тип света", lampCountLabel:"Количество ламп",
            equipLabel:"📺 Оборудование", totalLabel:"Итоговая стоимость",
            plastic:"Пластик", wood:"Дерево", metal:"Металл", fabric:"Ткань",
            carpet:"Ковролин", tile:"Плитка", parquet:"Паркет",
            warm:"Тёплый", cool:"Холодный", neutral:"Нейтральный",
            table:"Стол", chair:"Стул", counter:"Стойка", shelf:"Полка",
            monitor:"Монитор", speaker:"Динамик", camera:"Камера", banner:"Баннер",
            oneWall:"1 стена", twoWalls:"2 стены", threeWalls:"3 стены"
        },
        en: {
            title:"✨ Booth Designer", subtitle:"Ultra Premium Edition",
            dimLabel:"📐 Dimensions", lenLabel:"Length (m)", widLabel:"Width (m)", heiLabel:"Height (m)",
            wallsLabel:"🧱 Walls", wallsCountLabel:"Number of walls", wallColorLabel:"Wall Color", wallMatLabel:"Material",
            floorLabel:"🏢 Floor", floorColorLabel:"Floor Color", floorTypeLabel:"Floor Type",
            furnLabel:"🪑 Furniture", lightLabel:"💡 Lighting", lightTypeLabel:"Light Type", lampCountLabel:"Lamps",
            equipLabel:"📺 Equipment", totalLabel:"Total Price",
            plastic:"Plastic", wood:"Wood", metal:"Metal", fabric:"Fabric",
            carpet:"Carpet", tile:"Tile", parquet:"Parquet",
            warm:"Warm", cool:"Cool", neutral:"Neutral",
            table:"Table", chair:"Chair", counter:"Counter", shelf:"Shelf",
            monitor:"Monitor", speaker:"Speaker", camera:"Camera", banner:"Banner",
            oneWall:"1 wall", twoWalls:"2 walls", threeWalls:"3 walls"
        },
        lv: {
            title:"✨ Stenda Dizainers", subtitle:"Ultra Premium Edition",
            dimLabel:"📐 Izmēri", lenLabel:"Garums (m)", widLabel:"Platums (m)", heiLabel:"Augstums (m)",
            wallsLabel:"🧱 Sienas", wallsCountLabel:"Sienu skaits", wallColorLabel:"Sienu krāsa", wallMatLabel:"Materiāls",
            floorLabel:"🏢 Grīda", floorColorLabel:"Grīdas krāsa", floorTypeLabel:"Grīdas tips",
            furnLabel:"🪑 Mēbeles", lightLabel:"💡 Apgaismojums", lightTypeLabel:"Gaismas tips", lampCountLabel:"Lampu skaits",
            equipLabel:"📺 Aprīkojums", totalLabel:"Kopējā cena",
            plastic:"Plastmasa", wood:"Koks", metal:"Metāls", fabric:"Audums",
            carpet:"Paklājs", tile:"Flīzes", parquet:"Parkets",
            warm:"Silts", cool:"Vēss", neutral:"Neitrāls",
            table:"Galds", chair:"Krēsls", counter:"Skaitītājs", shelf:"Plaukts",
            monitor:"Monitors", speaker:"Skaļrunis", camera:"Kamera", banner:"Baneris",
            oneWall:"1 siena", twoWalls:"2 sienas", threeWalls:"3 sienas"
        }
    };

    let currentLang = 'ru';

    function applyLanguage() {
        const t = translations[currentLang];
        document.getElementById('title').innerText = t.title;
        document.getElementById('subtitle').innerText = t.subtitle;
        document.getElementById('dimLabel').innerHTML = t.dimLabel;
        document.getElementById('lenLabel').innerText = t.lenLabel;
        document.getElementById('widLabel').innerText = t.widLabel;
        document.getElementById('heiLabel').innerText = t.heiLabel;
        document.getElementById('wallsLabel').innerHTML = t.wallsLabel;
        document.getElementById('wallsCountLabel').innerText = t.wallsCountLabel;
        document.getElementById('wallColorLabel').innerText = t.wallColorLabel;
        document.getElementById('wallMatLabel').innerText = t.wallMatLabel;
        document.getElementById('floorLabel').innerHTML = t.floorLabel;
        document.getElementById('floorColorLabel').innerText = t.floorColorLabel;
        document.getElementById('floorTypeLabel').innerText = t.floorTypeLabel;
        document.getElementById('furnLabel').innerHTML = t.furnLabel;
        document.getElementById('lightLabel').innerHTML = t.lightLabel;
        document.getElementById('lightTypeLabel').innerText = t.lightTypeLabel;
        document.getElementById('lampCountLabel').innerText = t.lampCountLabel;
        document.getElementById('equipLabel').innerHTML = t.equipLabel;
        document.getElementById('totalLabel').innerText = t.totalLabel;
        document.querySelectorAll('[data-wallmat]').forEach(btn => { if(t[btn.dataset.wallmat]) btn.innerText = t[btn.dataset.wallmat]; });
        document.querySelectorAll('[data-floortype]').forEach(btn => { if(t[btn.dataset.floortype]) btn.innerText = t[btn.dataset.floortype]; });
        document.querySelectorAll('[data-lighttype]').forEach(btn => { if(t[btn.dataset.lighttype]) btn.innerText = t[btn.dataset.lighttype]; });
        const wallsCountBtns = document.querySelectorAll('[data-walls]');
        if(wallsCountBtns.length===3){ wallsCountBtns[0].innerText = t.oneWall; wallsCountBtns[1].innerText = t.twoWalls; wallsCountBtns[2].innerText = t.threeWalls; }
    }

    let config = {
        dims: { length:4, width:3, height:2.5 },
        wallsCount: 3,
        wallColor: '#ffffff',
        wallMaterial: 'plastic',
        floorColor: '#cccccc',
        floorType: 'carpet',
        lightType: 'warm',
        lampCount: 2,
        furniture: { table:0, chair:0, counter:0, shelf:0 },
        equipment: { monitor:0, speaker:0, camera:0, banner:0 },
        items: []
    };
    let nextId = 1;
    const prices = {
        baseSqm: 120,
        wallMat: { plastic:30, wood:80, metal:110, fabric:45 },
        floor: { carpet:25, tile:35, wood:55 },
        furniture: { table:180, chair:85, counter:320, shelf:210 },
        equipment: { monitor:650, speaker:220, camera:480, banner:130 },

    // Advanced texture creation
    function createAdvancedWoodTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        
        ctx.fillStyle = '#c7a47b';
        ctx.fillRect(0, 0, 512, 512);
        
        for(let i = 0; i < 200; i++) {
            const hue = Math.random() * 20 - 10;
            ctx.fillStyle = `hsl(${30 + hue}, 40%, ${40 + Math.random() * 10}%)`;
            ctx.fillRect(i * 20, 0, 10, 512);
        }
        
        const tex = new THREE.CanvasTexture(canvas);
        tex.wrapS = THREE.RepeatWrapping;
        tex.wrapT = THREE.RepeatWrapping;
        tex.repeat.set(2, 2);
        return tex;
    }

    function createAdvancedTileTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        
        ctx.fillStyle = '#b0b0b0';
        ctx.fillRect(0, 0, 512, 512);
        
        ctx.strokeStyle = '#808080';
        ctx.lineWidth = 8;
        for(let i = 0; i < 8; i++) {
            ctx.beginPath();
            ctx.moveTo(i * 64, 0);
            ctx.lineTo(i * 64, 512);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i * 64);
            ctx.lineTo(512, i * 64);
            ctx.stroke();
        }
        
        ctx.fillStyle = 'rgba(0,0,0,0.05)';
        for(let i = 0; i < 64; i++) {
            ctx.fillRect(Math.random() * 512, Math.random() * 512, Math.random() * 20, Math.random() * 20);
        }
        
        const tex = new THREE.CanvasTexture(canvas);
        tex.wrapS = THREE.RepeatWrapping;
        tex.wrapT = THREE.RepeatWrapping;
        tex.repeat.set(4, 4);
        return tex;
    }

    function createAdvancedParquetTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        
        ctx.fillStyle = '#b87c4f';
        ctx.fillRect(0, 0, 512, 512);
        
        for(let i = 0; i < 20; i++) {
            ctx.fillStyle = `hsl(${20}, ${50 + Math.random() * 20}%, ${50 + Math.random() * 10}%)`;
            ctx.fillRect(i * 50, 0, 20, 512);
        }
        
        const tex = new THREE.CanvasTexture(canvas);
        tex.wrapS = THREE.RepeatWrapping;
        tex.wrapT = THREE.RepeatWrapping;
        tex.repeat.set(4, 4);
        return tex;
    }

    function create3DObject(type, id, x, z) {
        let obj = null;
        switch(type) {
            case 'table':   obj = createTable(x, z); break;
            case 'chair':   obj = createChair(x, z); break;
            case 'counter': obj = createCounter(x, z); break;
            case 'shelf':   obj = createShelf(x, z); break;
            case 'monitor': obj = createMonitor(x, z); break;
            case 'speaker': obj = createSpeaker(x, z); break;
            case 'camera':  obj = createCamera(x, z); break;
            case 'banner':  obj = createBanner(x, z); break;
        }

        if(obj) {
            obj.userData.itemId = id;
            obj.userData.itemType = type;
            obj.userData.isSelectableGroup = true;
            obj.traverse(child => {
                if(child.isMesh) {
                    child.userData.selectableGroupId = id;
                    if(child.material) {
                        originalMaterials.set(child.uuid, {
                            color: child.material.color ? child.material.color.clone() : null,
                            emissive: child.material.emissive ? child.material.emissive.clone() : null
                        });
                    }
                }
            });
        }
        return obj;
    }

    function highlightObject(obj, highlight) {
        if(!obj) return;
        obj.traverse(child => {
            if(child.isMesh && child.material) {
                if(highlight) {
                    child.material.emissive = new THREE.Color(0x334400);
                    child.material.color.setHex(0xffdd66);
                } else {
                    const orig = originalMaterials.get(child.uuid);
                    if(orig) {
                        if(orig.color) child.material.color.copy(orig.color);
                        if(orig.emissive) child.material.emissive.copy(orig.emissive);
                        else child.material.emissive = new THREE.Color(0x000000);
                    }
                }
            }
        });
    }

    function rebuildScene() {
        while(boothGroup.children.length) boothGroup.remove(boothGroup.children[0]);
        itemMap.clear();
        originalMaterials.clear();

        const { length, width, height } = config.dims;

        const floorMat = getFloorMaterial();
        const floorPlane = new THREE.Mesh(new THREE.PlaneGeometry(length, width), floorMat);
        floorPlane.rotation.x = -Math.PI / 2;
        floorPlane.receiveShadow = true;
        boothGroup.add(floorPlane);

        const wallMat = getWallMaterial();
        const backWall = new THREE.Mesh(new THREE.BoxGeometry(length, height, 0.1), wallMat);
        backWall.position.set(0, height / 2, -width / 2);
        backWall.castShadow = true;
        backWall.receiveShadow = true;
        boothGroup.add(backWall);

        if(config.wallsCount >= 2) {
            const leftWall = new THREE.Mesh(new THREE.BoxGeometry(0.1, height, width), wallMat);
            leftWall.position.set(-length / 2, height / 2, 0);
            leftWall.castShadow = true;
            leftWall.receiveShadow = true;
            boothGroup.add(leftWall);
        }
        if(config.wallsCount >= 3) {
            const rightWall = new THREE.Mesh(new THREE.BoxGeometry(0.1, height, width), wallMat);
            rightWall.position.set(length / 2, height / 2, 0);
            rightWall.castShadow = true;
            rightWall.receiveShadow = true;
            boothGroup.add(rightWall);
        }

        config.items.forEach(item => {
            const obj = create3DObject(item.type, item.id, item.posX, item.posZ);
            if(obj) {
                boothGroup.add(obj);
                itemMap.set(item.id, obj);
            }
        });

        lamps.forEach(l => scene.remove(l));
        lamps = [];
        const lampColor = config.lightType === 'warm' ? 0xffaa66 : (config.lightType === 'cool' ? 0x88aaff : 0xffffff);
        for(let i = 0; i < config.lampCount; i++) {
            const lamp = new THREE.PointLight(lampColor, 1.2, 18);
            lamp.castShadow = true;
            lamp.shadow.mapSize.width = 1024;
            lamp.shadow.mapSize.height = 1024;
            lamp.shadow.bias = -0.0001;
            lamp.shadow.radius = 4;
            const angle = (i / Math.max(1, config.lampCount)) * Math.PI * 2;
            const lampX = Math.cos(angle) * 3.5;
            const lampZ = Math.sin(angle) * 3.5;
            lamp.position.set(lampX, 2.8, lampZ);
            scene.add(lamp);
            lamps.push(lamp);
        }

        updatePrice();
    }

    function updatePrice() {
        const { length, width, height } = config.dims;
        const area = length * width;
        let total = prices.baseSqm * area;
        total += prices.wallMat[config.wallMaterial] * (2 * (length + width) * height);
        total += prices.floor[config.floorType] * area;
        for(let [k, v] of Object.entries(config.furniture)) total += v * prices.furniture[k];
        for(let [k, v] of Object.entries(config.equipment)) total += v * prices.equipment[k];
        total += config.lampCount * prices.lamp;
        document.getElementById('totalPrice').innerHTML = `${Math.round(total).toLocaleString()} €`;
    }

    function getCanvasRay(event) {
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2(
            ((event.clientX - rect.left) / rect.width) * 2 - 1,
            -((event.clientY - rect.top) / rect.height) * 2 + 1
        );
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);
        return raycaster;
    }

    function getPlaneIntersect(event, plane) {
        const raycaster = getCanvasRay(event);
        const point = new THREE.Vector3();
        if(raycaster.ray.intersectPlane(plane, point)) return point;
        return null;
    }

    function trySelectObject(event) {
        const raycaster = getCanvasRay(event);
        const allMeshes = [];
        itemMap.forEach(obj => {
            obj.traverse(child => {
                if(child.isMesh) allMeshes.push(child);
            });
        });

        const intersects = raycaster.intersectObjects(allMeshes, false);
        if(intersects.length > 0) {
            const hitMesh = intersects[0].object;
            const groupId = hitMesh.userData.selectableGroupId;
            if(groupId) {
                const rootObj = itemMap.get(groupId);
                if(rootObj) return rootObj;
            }
        }
        return null;
    }

    function initThree() {
        const canvas = document.getElementById('canvas');
        const w = canvas.clientWidth, h = canvas.clientHeight;

        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.015);

        camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 100);

        renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
        renderer.setSize(w, h);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMappingExposure = 1.2;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;

        // Starfield background
        const starGeometry = new THREE.BufferGeometry();
        const starPos = [];
        for(let i = 0; i < 1500; i++) {
            starPos.push((Math.random() - 0.5) * 200, (Math.random() - 0.5) * 100, (Math.random() - 0.5) * 80 - 40);
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
        scene.add(new THREE.Points(starGeometry, new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 })));

        // Lighting setup
        scene.add(new THREE.AmbientLight(0x505080, 0.6));

        const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.5);
        mainLight.position.set(6, 12, 5);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        mainLight.shadow.camera.far = 30;
        mainLight.shadow.camera.left = -15;
        mainLight.shadow.camera.right = 15;
        mainLight.shadow.camera.top = 15;
        mainLight.shadow.camera.bottom = -15;
        mainLight.shadow.bias = -0.0005;
        mainLight.shadow.radius = 3;
        scene.add(mainLight);

        const fillLight = new THREE.DirectionalLight(0x8899ff, 0.4);
        fillLight.position.set(-5, 8, -5);
        scene.add(fillLight);

        const pointLight = new THREE.PointLight(0x4466cc, 0.5, 20);
        pointLight.position.set(-3, 4, -3);
        scene.add(pointLight);

        boothGroup = new THREE.Group();
        scene.add(boothGroup);

        window.addEventListener('resize', onResize);
        canvas.addEventListener('mousedown', onMouseDown);
        canvas.addEventListener('mousemove', onMouseMove);
        canvas.addEventListener('mouseup', onMouseUp);
        canvas.addEventListener('wheel', onWheel, { passive: false });
        canvas.addEventListener('contextmenu', e => e.preventDefault());

        animate();
    }

    function updateCamera() {
        const x = center.x + panX + radius * Math.sin(orbitX) * Math.cos(orbitY);
        const y = center.y + panY + radius * Math.sin(orbitY);
        const z = center.z + panZ + radius * Math.cos(orbitX) * Math.cos(orbitY);
        camera.position.set(x, y, z);
        camera.lookAt(center.x + panX, center.y + panY, center.z + panZ);
    }

    function onMouseDown(e) {
        e.preventDefault();

        if(e.button === 0) {
            const hit = trySelectObject(e);
            if(hit) {
                if(selectedObj && selectedObj !== hit) highlightObject(selectedObj, false);
                selectedObj = hit;
                selectedId = hit.userData.itemId;
                isDraggingObj = true;
                dragPlane.set(new THREE.Vector3(0, 1, 0), -selectedObj.position.y);
                const p = getPlaneIntersect(e, dragPlane);
                if(p) dragOffsetVec.copy(selectedObj.position).sub(p);
                highlightObject(selectedObj, true);
                document.getElementById('selectedInfo').innerText = `✓ ${selectedObj.userData.itemType.toUpperCase()}`;
                document.getElementById('selectedInfo').style.display = 'block';
                return;
            } else {
                if(selectedObj) {
                    highlightObject(selectedObj, false);
                    selectedObj = null;
                    selectedId = null;
                    document.getElementById('selectedInfo').style.display = 'none';
                }
                isOrbiting = true;
            }
        } else if(e.button === 2) {
            isPanning = true;
        }

        lastMousePos = { x: e.clientX, y: e.clientY };
    }

    function onMouseMove(e) {
        if(isDraggingObj && selectedObj) {
            const p = getPlaneIntersect(e, dragPlane);
            if(p) {
                let newPos = p.clone().add(dragOffsetVec);
                const limitX = (config.dims.length / 2) - 0.5;
                const limitZ = (config.dims.width / 2) - 0.5;
                newPos.x = Math.max(-limitX, Math.min(limitX, newPos.x));
                newPos.z = Math.max(-limitZ, Math.min(limitZ, newPos.z));
                newPos.y = selectedObj.position.y;
                selectedObj.position.copy(newPos);
                const item = config.items.find(i => i.id === selectedId);
                if(item) {
                    item.posX = newPos.x;
                    item.posZ = newPos.z;
                }
            }
            return;
        }

        if(!isOrbiting && !isPanning) return;

        const dx = e.clientX - lastMousePos.x;
        const dy = e.clientY - lastMousePos.y;

        if(isOrbiting) {
            orbitX += dx * 0.008;
            orbitY += dy * 0.008;
            orbitY = Math.max(0.15, Math.min(Math.PI / 2.1, orbitY));
        } else if(isPanning) {
            panX -= dx * 0.01;
            panY += dy * 0.01;
        }

        lastMousePos = { x: e.clientX, y: e.clientY };
    }

    function onMouseUp(e) {
        isDraggingObj = false;
        isOrbiting = false;
        isPanning = false;
    }

    function onWheel(e) {
        e.preventDefault();
        radius += e.deltaY * 0.01;
        radius = Math.max(3.0, Math.min(16, radius));
    }

    function onResize() {
        const canvas = document.getElementById('canvas');
        const w = canvas.clientWidth, h = canvas.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    }

    function animate() {
        requestAnimationFrame(animate);
        updateCamera();
        renderer.render(scene, camera);
    }

    function buildFurnitureUI() {
        const container = document.getElementById('furnitureUI');
        container.innerHTML = '';
        ['table', 'chair', 'counter', 'shelf'].forEach(type => {
            const div = document.createElement('div');
            div.className = 'option-group';
            const label = document.createElement('label');
            label.className = 'option-label';
            label.setAttribute('data-type', type);
            label.innerText = translations[currentLang][type];
            const ctrl = document.createElement('div');
            ctrl.className = 'counter-control';
            const minus = document.createElement('button');
            minus.innerText = '−';
            minus.className = 'counter-btn';
            const valSpan = document.createElement('span');
            valSpan.className = 'counter-value';
            valSpan.id = `furn_${type}`;
            valSpan.innerText = config.furniture[type];
            const plus = document.createElement('button');
            plus.innerText = '+';
            plus.className = 'counter-btn';
            minus.addEventListener('click', () => changeFurniture(type, -1));
            plus.addEventListener('click', () => changeFurniture(type, 1));
            ctrl.append(minus, valSpan, plus);
            div.append(label, ctrl);
            container.appendChild(div);
        });
    }

    function buildEquipmentUI() {
        const container = document.getElementById('equipmentUI');
        container.innerHTML = '';
        ['monitor', 'speaker', 'camera', 'banner'].forEach(type => {
            const div = document.createElement('div');
            div.className = 'option-group';
            const label = document.createElement('label');
            label.className = 'option-label';
            label.setAttribute('data-type', type);
            label.innerText = translations[currentLang][type];
            const ctrl = document.createElement('div');
            ctrl.className = 'counter-control';
            const minus = document.createElement('button');
            minus.innerText = '−';
            minus.className = 'counter-btn';
            const valSpan = document.createElement('span');
            valSpan.className = 'counter-value';
            valSpan.id = `equip_${type}`;
            valSpan.innerText = config.equipment[type];
            const plus = document.createElement('button');
            plus.innerText = '+';
            plus.className = 'counter-btn';
            minus.addEventListener('click', () => changeEquipment(type, -1));
            plus.addEventListener('click', () => changeEquipment(type, 1));
            ctrl.append(minus, valSpan, plus);
            div.append(label, ctrl);
            container.appendChild(div);
        });
    }

    function addItem(type, category) {
        const limitX = (config.dims.length / 2) - 0.8;
        const limitZ = (config.dims.width / 2) - 0.8;
        const posX = (Math.random() - 0.5) * limitX * 1.6;
        const posZ = (Math.random() - 0.5) * limitZ * 1.6;
        const id = `${category}_${type}_${nextId++}`;
        config.items.push({ id, type, category, posX, posZ });
    }

    function removeLastItem(type, category) {
        for(let i = config.items.length - 1; i >= 0; i--) {
            if(config.items[i].type === type && config.items[i].category === category) {
                config.items.splice(i, 1);
                break;
            }
        }
    }

    function changeFurniture(type, delta) {
        let newVal = config.furniture[type] + delta;
        if(newVal < 0) newVal = 0;
        if(newVal > 20) newVal = 20;
        if(newVal > config.furniture[type]) for(let i = 0; i < newVal - config.furniture[type]; i++) addItem(type, 'furniture');
        else if(newVal < config.furniture[type]) for(let i = 0; i < config.furniture[type] - newVal; i++) removeLastItem(type, 'furniture');
        config.furniture[type] = newVal;
        document.getElementById(`furn_${type}`).innerText = newVal;
        rebuildScene();
    }

    function changeEquipment(type, delta) {
        let newVal = config.equipment[type] + delta;
        if(newVal < 0) newVal = 0;
        if(newVal > 20) newVal = 20;
        if(newVal > config.equipment[type]) for(let i = 0; i < newVal - config.equipment[type]; i++) addItem(type, 'equipment');
        else if(newVal < config.equipment[type]) for(let i = 0; i < config.equipment[type] - newVal; i++) removeLastItem(type, 'equipment');
        config.equipment[type] = newVal;
        document.getElementById(`equip_${type}`).innerText = newVal;
        rebuildScene();
    }

    function syncUI() {
        document.querySelectorAll('[data-length]').forEach(btn => btn.classList.remove('selected'));
        document.querySelector(`[data-length="${config.dims.length}"]`).classList.add('selected');
        document.querySelectorAll('[data-width]').forEach(btn => btn.classList.remove('selected'));
        document.querySelector(`[data-width="${config.dims.width}"]`).classList.add('selected');
        document.querySelectorAll('[data-height]').forEach(btn => btn.classList.remove('selected'));
        document.querySelector(`[data-height="${config.dims.height}"]`).classList.add('selected');
        document.querySelectorAll('[data-walls]').forEach(btn => btn.classList.remove('selected'));
        document.querySelector(`[data-walls="${config.wallsCount}"]`).classList.add('selected');
        document.getElementById('wallColorPicker').value = config.wallColor;
        document.getElementById('floorColorPicker').value = config.floorColor;
        document.querySelectorAll('[data-wallmat]').forEach(btn => btn.classList.remove('selected'));
        document.querySelector(`[data-wallmat="${config.wallMaterial}"]`).classList.add('selected');
        document.querySelectorAll('[data-floortype]').forEach(btn => btn.classList.remove('selected'));
        document.querySelector(`[data-floortype="${config.floorType}"]`).classList.add('selected');
        document.querySelectorAll('[data-lighttype]').forEach(btn => btn.classList.remove('selected'));
        document.querySelector(`[data-lighttype="${config.lightType}"]`).classList.add('selected');
        document.getElementById('lampCountVal').innerText = config.lampCount;
        buildFurnitureUI();
        buildEquipmentUI();
    }

    function resetConfig() {
        if(selectedObj) {
            highlightObject(selectedObj, false);
            selectedObj = null;
            selectedId = null;
            document.getElementById('selectedInfo').style.display = 'none';
        }
        config = {
            dims: { length: 4, width: 3, height: 2.5 },
            wallsCount: 3,
            wallColor: '#ffffff',
            wallMaterial: 'plastic',
            floorColor: '#cccccc',
            floorType: 'carpet',
            lightType: 'warm',
            lampCount: 2,
            furniture: { table: 0, chair: 0, counter: 0, shelf: 0 },
            equipment: { monitor: 0, speaker: 0, camera: 0, banner: 0 },
            items: []
        };
        nextId = 1;
        syncUI();
        rebuildScene();
    }

    function saveToFile() {
        const dataStr = JSON.stringify(config, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'booth_config.json';
        a.click();
        URL.revokeObjectURL(url);
        alert('Конфигурация сохранена');
    }

    function attachEvents() {
        document.getElementById('lengthOpts').querySelectorAll('[data-length]').forEach(btn => btn.addEventListener('click', e => {
            config.dims.length = parseFloat(e.target.dataset.length);
            rebuildScene();
            syncUI();
        }));
        document.getElementById('widthOpts').querySelectorAll('[data-width]').forEach(btn => btn.addEventListener('click', e => {
            config.dims.width = parseFloat(e.target.dataset.width);
            rebuildScene();
            syncUI();
        }));
        document.getElementById('heightOpts').querySelectorAll('[data-height]').forEach(btn => btn.addEventListener('click', e => {
            config.dims.height = parseFloat(e.target.dataset.height);
            rebuildScene();
            syncUI();
        }));
        document.getElementById('wallsCountOpts').querySelectorAll('[data-walls]').forEach(btn => btn.addEventListener('click', e => {
            config.wallsCount = parseInt(e.target.dataset.walls);
            rebuildScene();
            syncUI();
        }));
        document.getElementById('wallColorPicker').addEventListener('change', e => {
            config.wallColor = e.target.value;
            rebuildScene();
        });
        document.getElementById('floorColorPicker').addEventListener('change', e => {
            config.floorColor = e.target.value;
            rebuildScene();
        });
        document.getElementById('wallMatOpts').querySelectorAll('[data-wallmat]').forEach(btn => btn.addEventListener('click', e => {
            config.wallMaterial = e.target.dataset.wallmat;
            rebuildScene();
            syncUI();
        }));
        document.getElementById('floorTypeOpts').querySelectorAll('[data-floortype]').forEach(btn => btn.addEventListener('click', e => {
            config.floorType = e.target.dataset.floortype;
            rebuildScene();
            syncUI();
        }));
        document.getElementById('lightTypeOpts').querySelectorAll('[data-lighttype]').forEach(btn => btn.addEventListener('click', e => {
            config.lightType = e.target.dataset.lighttype;
            rebuildScene();
            syncUI();
        }));
        document.getElementById('lampPlus').addEventListener('click', () => {
            if(config.lampCount < 8) {
                config.lampCount++;
                document.getElementById('lampCountVal').innerText = config.lampCount;
                rebuildScene();
            }
        });
        document.getElementById('lampMinus').addEventListener('click', () => {
            if(config.lampCount > 0) {
                config.lampCount--;
                document.getElementById('lampCountVal').innerText = config.lampCount;
                rebuildScene();
            }
        });
        document.getElementById('saveBtn').addEventListener('click', saveToFile);
        document.getElementById('resetBtn').addEventListener('click', resetConfig);
        document.querySelectorAll('.category-header').forEach(h => h.addEventListener('click', () => h.parentElement.classList.toggle('active')));
        document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => {
            currentLang = btn.dataset.lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            applyLanguage();
            syncUI();
        }));
    }

    function start() {
        initThree();
        attachEvents();
        syncUI();
        rebuildScene();
        applyLanguage();
    }

    start();
</script>
