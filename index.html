<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конфигуратор Выставочного Стенда Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #0f0f1e; color: #fff; overflow: hidden; }
        #canvas { display: block; width: 100%; height: 100vh; }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 340px;
            height: 100vh;
            background: rgba(20, 20, 40, 0.85);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            overflow-y: auto;
            padding: 20px;
            z-index: 10;
        }
        .section { margin-bottom: 24px; }
        .section-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 12px; }
        .btn { width: 100%; padding: 10px; margin: 6px 0; background: rgba(100, 150, 255, 0.2); border: 1px solid rgba(100, 150, 255, 0.5); color: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .btn:hover { background: rgba(100, 150, 255, 0.4); border-color: rgba(100, 150, 255, 0.8); }
        .btn.active { background: rgba(100, 150, 255, 0.6); border-color: rgba(100, 150, 255, 1); }
        .btn-small { padding: 8px 12px; font-size: 12px; margin: 4px 2px; display: inline-block; width: auto; }
        .slider-group { margin: 12px 0; }
        .slider-label { font-size: 12px; color: #aaa; margin-bottom: 6px; display: flex; justify-content: space-between; }
        input[type="range"] { width: 100%; }
        input[type="color"] { width: 100%; height: 40px; border: none; border-radius: 6px; cursor: pointer; }
        .color-palette { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
        .color-swatch { width: 100%; aspect-ratio: 1; border-radius: 6px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
        .color-swatch:hover { border-color: #fff; transform: scale(1.05); }
        #info { position: absolute; bottom: 20px; left: 20px; font-size: 11px; color: #888; background: rgba(0,0,0,0.5); padding: 12px; border-radius: 6px; max-width: 300px; }
        #selectedPanel { background: rgba(100, 150, 255, 0.1); border: 1px solid rgba(100, 150, 255, 0.3); border-radius: 8px; padding: 12px; margin-bottom: 16px; }
        #selectedPanel h3 { font-size: 14px; margin-bottom: 12px; color: #6af; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="ui">
        <h1 style="font-size: 20px; margin-bottom: 24px;">Конфигуратор Pro</h1>
        
        <div id="selectedPanel" class="hidden">
            <h3 id="selectedName">Выбран объект</h3>
            <div class="section">
                <div class="section-title">🎨 Цвет</div>
                <input type="color" id="colorPicker" onchange="changeSelectedColor(this.value)">
                <div class="color-palette">
                    <div class="color-swatch" style="background: #3a3a3a;" onclick="changeSelectedColor('#3a3a3a')"></div>
                    <div class="color-swatch" style="background: #8b7355;" onclick="changeSelectedColor('#8b7355')"></div>
                    <div class="color-swatch" style="background: #4a7bdb;" onclick="changeSelectedColor('#4a7bdb')"></div>
                    <div class="color-swatch" style="background: #db4a4a;" onclick="changeSelectedColor('#db4a4a')"></div>
                    <div class="color-swatch" style="background: #4adb7b;" onclick="changeSelectedColor('#4adb7b')"></div>
                    <div class="color-swatch" style="background: #dbb04a;" onclick="changeSelectedColor('#dbb04a')"></div>
                    <div class="color-swatch" style="background: #1a1a1a;" onclick="changeSelectedColor('#1a1a1a')"></div>
                    <div class="color-swatch" style="background: #f5f5f5;" onclick="changeSelectedColor('#f5f5f5')"></div>
                </div>
            </div>
            <div class="section">
                <div class="section-title">🔄 Управление</div>
                <button class="btn btn-small" onclick="rotateSelected(45)">↻ +45°</button>
                <button class="btn btn-small" onclick="rotateSelected(-45)">↺ -45°</button>
                <button class="btn btn-small" style="width: calc(100% - 8px);" onclick="deleteSelected()">🗑️ Удалить</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">📐 Размеры Стенда</div>
            <div class="slider-group">
                <div class="slider-label">Длина (м) <span id="lengthVal">2</span></div>
                <input type="range" id="lengthSlider" min="2" max="8" value="2" step="0.5">
            </div>
            <div class="slider-group">
                <div class="slider-label">Ширина (м) <span id="widthVal">3</span></div>
                <input type="range" id="widthSlider" min="2" max="8" value="3" step="0.5">
            </div>
        </div>

        <div class="section">
            <div class="section-title">🛋️ Мебель & Оборудование</div>
            <button class="btn" onclick="addObject('chair')">+ Стул</button>
            <button class="btn" onclick="addObject('sofa')">+ Диван</button>
            <button class="btn" onclick="addObject('table')">+ Стол</button>
            <button class="btn" onclick="addObject('monitor')">+ Монитор</button>
            <button class="btn" onclick="addObject('showcase')">+ Витрина</button>
            <button class="btn" onclick="addObject('speaker')">+ Динамик</button>
            <button class="btn" onclick="addObject('camera')">+ Камера</button>
            <button class="btn" onclick="addObject('banner')">+ Баннер</button>
            <button class="btn" onclick="addObject('counter')">+ Стойка</button>
            <button class="btn" onclick="addObject('shelf')">+ Полка</button>
        </div>

        <div class="section">
            <div class="section-title">⚙️ Сцена</div>
            <button class="btn" onclick="clearAll()">Очистить всё</button>
        </div>
    </div>

    <div id="info">
        <div>Клик: выбрать | Перетащить: переместить | R: повернуть | Удалить: удалить</div>
        <div id="selectedInfo" style="margin-top: 8px; color: #6a9;">Ничего не выбрано</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ========== THREE.JS SETUP ==========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.Fog(0x1a1a2e, 20, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3, 2.5, 3);
        camera.lookAt(0, 0.5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowShadowMap;
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);

        // ========== LIGHTING ==========
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 8, 5);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        directionalLight.shadow.camera.far = 50;
        directionalLight.shadow.camera.left = -15;
        directionalLight.shadow.camera.right = 15;
        directionalLight.shadow.camera.top = 15;
        directionalLight.shadow.camera.bottom = -15;
        scene.add(directionalLight);

        const fillLight = new THREE.PointLight(0xffffff, 0.3, 50);
        fillLight.position.set(-5, 3, -5);
        scene.add(fillLight);

        // ========== ENVIRONMENT ==========
        function createEnvironment() {
            const floorGeom = new THREE.PlaneGeometry(30, 30);
            const floorMat = new THREE.MeshStandardMaterial({
                color: 0xe8e8e8,
                roughness: 0.5,
                metalness: 0.05,
                envMapIntensity: 0.3
            });
            const floor = new THREE.Mesh(floorGeom, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            const wallMat = new THREE.MeshStandardMaterial({
                color: 0xd4d4d4,
                roughness: 0.7,
                metalness: 0.05,
                envMapIntensity: 0.2
            });

            const backWallGeom = new THREE.PlaneGeometry(30, 12);
            const backWall = new THREE.Mesh(backWallGeom, wallMat);
            backWall.position.set(0, 6, -15);
            backWall.receiveShadow = true;
            scene.add(backWall);

            const sideWallGeom = new THREE.PlaneGeometry(30, 12);
            const leftWall = new THREE.Mesh(sideWallGeom, wallMat);
            leftWall.rotation.y = Math.PI / 2;
            leftWall.position.set(-15, 6, 0);
            leftWall.receiveShadow = true;
            scene.add(leftWall);

            const rightWall = new THREE.Mesh(sideWallGeom, wallMat);
            rightWall.rotation.y = -Math.PI / 2;
            rightWall.position.set(15, 6, 0);
            rightWall.receiveShadow = true;
            scene.add(rightWall);

            const beamMat = new THREE.MeshStandardMaterial({
                color: 0x3a3a3a,
                roughness: 0.4,
                metalness: 0.8,
                envMapIntensity: 0.5
            });

            for(let i = -12; i <= 12; i += 4) {
                const beamGeom = new THREE.BoxGeometry(30, 0.15, 0.15);
                const beam = new THREE.Mesh(beamGeom, beamMat);
                beam.position.set(0, 11.5, i);
                beam.castShadow = true;
                scene.add(beam);
            }
        }

        createEnvironment();

        // ========== FURNITURE CREATION ==========

        function createChair(x, z, color = 0x3a3a3a) {
            const grp = new THREE.Group();

            const seatMat = new THREE.MeshStandardMaterial({
                color: color,
                roughness: 0.7,
                metalness: 0.0,
                envMapIntensity: 0.3
            });
            const seatGeom = new THREE.BoxGeometry(0.52, 0.08, 0.48);
            const seat = new THREE.Mesh(seatGeom, seatMat);
            seat.position.y = 0.46;
            seat.rotation.x = 0;
            seat.rotation.y = 0;
            seat.rotation.z = 0;
            seat.castShadow = true;
            seat.receiveShadow = true;
            grp.add(seat);

            const legMat = new THREE.MeshStandardMaterial({
                color: 0x4a4a4a,
                roughness: 0.6,
                metalness: 0.1,
                envMapIntensity: 0.4
            });
            const legGeom = new THREE.CylinderGeometry(0.035, 0.025, 0.44, 8);
            const legPositions = [[-0.2, 0.22, -0.18], [0.2, 0.22, -0.18], [-0.2, 0.22, 0.18], [0.2, 0.22, 0.18]];
            legPositions.forEach(([lx, ly, lz]) => {
                const leg = new THREE.Mesh(legGeom, legMat);
                leg.position.set(lx, ly, lz);
                leg.castShadow = true;
                grp.add(leg);
            });

            const backMat = new THREE.MeshStandardMaterial({
                color: color,
                roughness: 0.7,
                metalness: 0.0,
                envMapIntensity: 0.3
            });
            const backGeom = new THREE.BoxGeometry(0.48, 0.56, 0.08);
            const back = new THREE.Mesh(backGeom, backMat);
            back.position.set(0, 0.78, -0.24);
            back.rotation.x = 0;
            back.rotation.y = 0;
            back.rotation.z = 0;
            back.castShadow = true;
            grp.add(back);

            const armMat = new THREE.MeshStandardMaterial({
                color: 0x4a4a4a,
                roughness: 0.6,
                metalness: 0.1,
                envMapIntensity: 0.4
            });
            const armGeom = new THREE.BoxGeometry(0.08, 0.25, 0.06);
            
            const armLeft = new THREE.Mesh(armGeom, armMat);
            armLeft.position.set(-0.27, 0.56, -0.02);
            armLeft.castShadow = true;
            grp.add(armLeft);

            const armRight = new THREE.Mesh(armGeom, armMat);
            armRight.position.set(0.27, 0.56, -0.02);
            armRight.castShadow = true;
            grp.add(armRight);

            grp.position.set(x, 0, z);
            grp.userData.type = 'chair';
            grp.userData.rotation = 0;
            grp.userData.baseColor = color;
            grp.userData.colorableIndex = 0;
            return grp;
        }

        function createSofa(x, z, color = 0x8b7355) {
            const grp = new THREE.Group();

            const seatMat = new THREE.MeshStandardMaterial({
                color: color,
                roughness: 0.8,
                metalness: 0.0,
                envMapIntensity: 0.2
            });

            // Основное сиденье
            const seatGeom = new THREE.BoxGeometry(2.0, 0.12, 0.8);
            const seat = new THREE.Mesh(seatGeom, seatMat);
            seat.position.y = 0.5;
            seat.castShadow = true;
            seat.receiveShadow = true;
            grp.add(seat);

            // Подушки спинки
            const backGeom = new THREE.BoxGeometry(2.0, 0.6, 0.15);
            const back = new THREE.Mesh(backGeom, seatMat);
            back.position.set(0, 0.9, -0.4);
            back.castShadow = true;
            grp.add(back);

            // Подлокотники
            const armGeom = new THREE.BoxGeometry(0.15, 0.5, 0.8);
            const armLeft = new THREE.Mesh(armGeom, seatMat);
            armLeft.position.set(-1.05, 0.6, 0);
            armLeft.castShadow = true;
            grp.add(armLeft);

            const armRight = new THREE.Mesh(armGeom, seatMat);
            armRight.position.set(1.05, 0.6, 0);
            armRight.castShadow = true;
            grp.add(armRight);

            // Ножки
            const legMat = new THREE.MeshStandardMaterial({
                color: 0x3a3a3a,
                roughness: 0.5,
                metalness: 0.3,
                envMapIntensity: 0.4
            });
            const legGeom = new THREE.BoxGeometry(0.1, 0.08, 0.1);
            const legPositions = [[-0.8, 0.04, -0.35], [0.8, 0.04, -0.35], [-0.8, 0.04, 0.35], [0.8, 0.04, 0.35]];
            legPositions.forEach(([lx, ly, lz]) => {
                const leg = new THREE.Mesh(legGeom, legMat);
                leg.position.set(lx, ly, lz);
                leg.castShadow = true;
                grp.add(leg);
            });

            grp.position.set(x, 0, z);
            grp.userData.type = 'sofa';
            grp.userData.rotation = 0;
            grp.userData.baseColor = color;
            grp.userData.colorableIndex = 0;
            return grp;
        }

        function createShowcase(x, z) {
            const grp = new THREE.Group();

            // Каркас
            const frameMat = new THREE.MeshStandardMaterial({
                color: 0x2a2a2a,
                roughness: 0.3,
                metalness: 0.8,
                envMapIntensity: 0.6
            });

            const frameGeom = new THREE.BoxGeometry(0.8, 0.05, 0.05);
            for(let i = 0; i < 4; i++) {
                const frame = new THREE.Mesh(frameGeom, frameMat);
                frame.position.y = 0.15 + i * 0.5;
                frame.castShadow = true;
                grp.add(frame);
            }

            // Стекло
            const glassMat = new THREE.MeshStandardMaterial({
                color: 0xccccff,
                roughness: 0.1,
                metalness: 0.0,
                transparent: true,
                opacity: 0.4,
                envMapIntensity: 1.0
            });

            const glassGeom = new THREE.BoxGeometry(0.75, 1.8, 0.5);
            const glass = new THREE.Mesh(glassGeom, glassMat);
            glass.position.y = 0.9;
            glass.castShadow = true;
            grp.add(glass);

            // Полки внутри
            const shelfMat = new THREE.MeshStandardMaterial({
                color: 0x4a4a4a,
                roughness: 0.6,
                metalness: 0.2,
                envMapIntensity: 0.3
            });

            const shelfGeom = new THREE.BoxGeometry(0.7, 0.02, 0.45);
            for(let i = 0; i < 4; i++) {
                const shelf = new THREE.Mesh(shelfGeom, shelfMat);
                shelf.position.y = 0.3 + i * 0.5;
                shelf.castShadow = true;
                grp.add(shelf);
            }

            // LED подсветка
            const lightMat = new THREE.MeshStandardMaterial({
                color: 0xffff99,
                emissive: 0xffff99,
                emissiveIntensity: 0.5,
                roughness: 0.2,
                metalness: 0.8
            });

            const lightGeom = new THREE.BoxGeometry(0.7, 0.02, 0.02);
            for(let i = 0; i < 4; i++) {
                const light = new THREE.Mesh(lightGeom, lightMat);
                light.position.set(0, 0.28 + i * 0.5, 0.23);
                light.castShadow = true;
                grp.add(light);
            }

            // База
            const baseGeom = new THREE.BoxGeometry(0.8, 0.1, 0.5);
            const base = new THREE.Mesh(baseGeom, frameMat);
            base.position.y = 0.05;
            base.castShadow = true;
            grp.add(base);

            grp.position.set(x, 0, z);
            grp.userData.type = 'showcase';
            grp.userData.rotation = 0;
            return grp;
        }

        function createTable(x, z, color = 0xf5f5f5) {
            const grp = new THREE.Group();
            
            const topMat = new THREE.MeshStandardMaterial({
                color: color,
                roughness: 0.15,
                metalness: 0.0,
                envMapIntensity: 0.8,
                transparent: true,
                opacity: 0.95
            });
            const topGeom = new THREE.BoxGeometry(1.4, 0.04, 0.75);
            const top = new THREE.Mesh(topGeom, topMat);
            top.position.y = 0.78;
            top.castShadow = true;
            top.receiveShadow = true;
            grp.add(top);

            const metalMat = new THREE.MeshStandardMaterial({
                color: 0x2a2a2a,
                roughness: 0.2,
                metalness: 0.9,
                envMapIntensity: 1.0
            });

            const legGeom = new THREE.BoxGeometry(0.08, 0.75, 0.04);
            const leg1 = new THREE.Mesh(legGeom, metalMat);
            leg1.position.set(-0.5, 0.38, 0);
            leg1.castShadow = true;
            grp.add(leg1);

            const leg2 = new THREE.Mesh(legGeom, metalMat);
            leg2.position.set(0.5, 0.38, 0);
            leg2.castShadow = true;
            grp.add(leg2);

            const crossGeom = new THREE.BoxGeometry(1.0, 0.04, 0.04);
            const cross = new THREE.Mesh(crossGeom, metalMat);
            cross.position.y = 0.15;
            cross.castShadow = true;
            grp.add(cross);

            grp.position.set(x, 0, z);
            grp.userData.type = 'table';
            grp.userData.rotation = 0;
            grp.userData.baseColor = color;
            grp.userData.colorableIndex = 0;
            return grp;
        }

        function createMonitor(x, z) {
            const grp = new THREE.Group();

            const standMat = new THREE.MeshStandardMaterial({
                color: 0x2a2a2a,
                roughness: 0.3,
                metalness: 0.8,
                envMapIntensity: 0.6
            });

            const baseGeom = new THREE.BoxGeometry(0.5, 0.05, 0.3);
            const base = new THREE.Mesh(baseGeom, standMat);
            base.position.y = 0.025;
            base.castShadow = true;
            grp.add(base);

            const neckGeom = new THREE.CylinderGeometry(0.04, 0.04, 0.4, 16);
            const neck = new THREE.Mesh(neckGeom, standMat);
            neck.position.y = 0.25;
            neck.castShadow = true;
            grp.add(neck);

            const screenMat = new THREE.MeshStandardMaterial({
                color: 0x1a1a1a,
                roughness: 0.05,
                metalness: 0.3,
                emissive: 0x333333,
                envMapIntensity: 1.0
            });

            const screenGeom = new THREE.BoxGeometry(0.6, 0.38, 0.04);
            const screen = new THREE.Mesh(screenGeom, screenMat);
            screen.position.y = 0.65;
            screen.castShadow = true;
            grp.add(screen);

            const bezelMat = new THREE.MeshStandardMaterial({
                color: 0x1a1a1a,
                roughness: 0.4,
                metalness: 0.5,
                envMapIntensity: 0.4
            });

            const bezelGeom = new THREE.BoxGeometry(0.65, 0.43, 0.02);
            const bezel = new THREE.Mesh(bezelGeom, bezelMat);
            bezel.position.y = 0.65;
            bezel.position.z = -0.01;
            bezel.castShadow = true;
            grp.add(bezel);

            grp.position.set(x, 0, z);
            grp.userData.type = 'monitor';
            grp.userData.rotation = 0;
            return grp;
        }

        function createSpeaker(x, z) {
            const grp = new THREE.Group();

            const bodyMat = new THREE.MeshStandardMaterial({
                color: 0x2a2a2a,
                roughness: 0.5,
                metalness: 0.3,
                envMapIntensity: 0.4
            });

            const bodyGeom = new THREE.BoxGeometry(0.25, 0.45, 0.25);
            const body = new THREE.Mesh(bodyGeom, bodyMat);
            body.position.y = 0.225;
            body.castShadow = true;
            grp.add(body);

            const speakerMat = new THREE.MeshStandardMaterial({
                color: 0x1a1a1a,
                roughness: 0.8,
                metalness: 0.1,
                envMapIntensity: 0.2
            });

            const speakerGeom = new THREE.CylinderGeometry(0.08, 0.08, 0.05, 32);
            const speaker = new THREE.Mesh(speakerGeom, speakerMat);
            speaker.position.set(0, 0.35, 0);
            speaker.castShadow = true;
            grp.add(speaker);

            grp.position.set(x, 0, z);
            grp.userData.type = 'speaker';
            grp.userData.rotation = 0;
            return grp;
        }

        function createCamera(x, z) {
            const grp = new THREE.Group();

            const cameraMat = new THREE.MeshStandardMaterial({
                color: 0x1a1a1a,
                roughness: 0.3,
                metalness: 0.7,
                envMapIntensity: 0.5
            });

            const bodyGeom = new THREE.SphereGeometry(0.08, 16, 16);
            const body = new THREE.Mesh(bodyGeom, cameraMat);
            body.position.y = 0.08;
            body.castShadow = true;
            grp.add(body);

            const lensGeom = new THREE.CylinderGeometry(0.05, 0.05, 0.03, 16);
            const lens = new THREE.Mesh(lensGeom, cameraMat);
            lens.position.set(0, 0.08, 0.08);
            lens.castShadow = true;
            grp.add(lens);

            grp.position.set(x, 0, z);
            grp.userData.type = 'camera';
            grp.userData.rotation = 0;
            return grp;
        }

        function createBanner(x, z, color = 0x4a7bdb) {
            const grp = new THREE.Group();

            const baseMat = new THREE.MeshStandardMaterial({
                color: 0x3a3a3a,
                roughness: 0.6,
                metalness: 0.2,
                envMapIntensity: 0.3
            });

            const baseGeom = new THREE.CylinderGeometry(0.3, 0.3, 0.1, 16);
            const base = new THREE.Mesh(baseGeom, baseMat);
            base.position.y = 0.05;
            base.castShadow = true;
            grp.add(base);

            const poleGeom = new THREE.CylinderGeometry(0.04, 0.04, 1.8, 8);
            const pole = new THREE.Mesh(poleGeom, baseMat);
            pole.position.y = 0.95;
            pole.castShadow = true;
            grp.add(pole);

            const bannerMat = new THREE.MeshStandardMaterial({
                color: color,
                roughness: 0.8,
                metalness: 0.0,
                envMapIntensity: 0.2
            });

            const bannerGeom = new THREE.PlaneGeometry(0.8, 0.6);
            const banner = new THREE.Mesh(bannerGeom, bannerMat);
            banner.position.set(0, 1.5, 0);
            banner.castShadow = true;
            grp.add(banner);

            grp.position.set(x, 0, z);
            grp.userData.type = 'banner';
            grp.userData.rotation = 0;
            grp.userData.baseColor = color;
            grp.userData.colorableIndex = 2;
            return grp;
        }

        function createCounter(x, z, color = 0x8b7355) {
            const grp = new THREE.Group();

            const topMat = new THREE.MeshStandardMaterial({
                color: color,
                roughness: 0.5,
                metalness: 0.1,
                envMapIntensity: 0.3
            });

            const topGeom = new THREE.BoxGeometry(1.0, 0.05, 0.6);
            const top = new THREE.Mesh(topGeom, topMat);
            top.position.y = 1.05;
            top.castShadow = true;
            grp.add(top);

            const bodyMat = new THREE.MeshStandardMaterial({
                color: color,
                roughness: 0.6,
                metalness: 0.05,
                envMapIntensity: 0.2
            });

            const bodyGeom = new THREE.BoxGeometry(1.0, 1.0, 0.6);
            const body = new THREE.Mesh(bodyGeom, bodyMat);
            body.position.y = 0.5;
            body.castShadow = true;
            grp.add(body);

            const legMat = new THREE.MeshStandardMaterial({
                color: 0x3a3a3a,
                roughness: 0.4,
                metalness: 0.6,
                envMapIntensity: 0.4
            });

            const legGeom = new THREE.BoxGeometry(0.08, 0.5, 0.08);
            const legPositions = [[-0.4, 0.25, -0.25], [0.4, 0.25, -0.25], [-0.4, 0.25, 0.25], [0.4, 0.25, 0.25]];
            legPositions.forEach(([lx, ly, lz]) => {
                const leg = new THREE.Mesh(legGeom, legMat);
                leg.position.set(lx, ly, lz);
                leg.castShadow = true;
                grp.add(leg);
            });

            grp.position.set(x, 0, z);
            grp.userData.type = 'counter';
            grp.userData.rotation = 0;
            grp.userData.baseColor = color;
            grp.userData.colorableIndex = 0;
            return grp;
        }

        function createShelf(x, z, color = 0x8b7355) {
            const grp = new THREE.Group();

            const shelfMat = new THREE.MeshStandardMaterial({
                color: color,
                roughness: 0.5,
                metalness: 0.1,
                envMapIntensity: 0.3
            });

            const shelfGeom = new THREE.BoxGeometry(0.8, 0.04, 0.4);
            for(let i = 0; i < 3; i++) {
                const shelf = new THREE.Mesh(shelfGeom, shelfMat);
                shelf.position.y = 0.3 + i * 0.4;
                shelf.castShadow = true;
                grp.add(shelf);
            }

            const bracketMat = new THREE.MeshStandardMaterial({
                color: 0x3a3a3a,
                roughness: 0.4,
                metalness: 0.6,
                envMapIntensity: 0.4
            });

            const bracketGeom = new THREE.BoxGeometry(0.04, 0.3, 0.1);
            for(let i = 0; i < 2; i++) {
                const bracket = new THREE.Mesh(bracketGeom, bracketMat);
                bracket.position.set(i === 0 ? -0.35 : 0.35, 0.5, 0);
                bracket.castShadow = true;
                grp.add(bracket);
            }

            grp.position.set(x, 0, z);
            grp.userData.type = 'shelf';
            grp.userData.rotation = 0;
            grp.userData.baseColor = color;
            grp.userData.colorableIndex = 0;
            return grp;
        }

        // ========== OBJECT MANAGEMENT ==========
        const objects = [];
        let selectedObject = null;

        function addObject(type) {
            let obj;
            const x = (Math.random() - 0.5) * 2;
            const z = (Math.random() - 0.5) * 2;

            switch(type) {
                case 'chair': obj = createChair(x, z); break;
                case 'sofa': obj = createSofa(x, z); break;
                case 'table': obj = createTable(x, z); break;
                case 'monitor': obj = createMonitor(x, z); break;
                case 'showcase': obj = createShowcase(x, z); break;
                case 'speaker': obj = createSpeaker(x, z); break;
                case 'camera': obj = createCamera(x, z); break;
                case 'banner': obj = createBanner(x, z); break;
                case 'counter': obj = createCounter(x, z); break;
                case 'shelf': obj = createShelf(x, z); break;
                default: return;
            }

            scene.add(obj);
            objects.push(obj);
        }

        function selectObject(obj) {
            if(selectedObject) {
                selectedObject.children.forEach(child => {
                    if(child.material) child.material.emissive.setHex(0x000000);
                });
            }
            selectedObject = obj;
            if(obj) {
                obj.children.forEach(child => {
                    if(child.material) child.material.emissive.setHex(0x444400);
                });
                document.getElementById('selectedName').textContent = `Выбрано: ${obj.userData.type}`;
                document.getElementById('selectedPanel').classList.remove('hidden');
                document.getElementById('selectedInfo').textContent = `Выбрано: ${obj.userData.type}`;
                if(obj.userData.baseColor) {
                    document.getElementById('colorPicker').value = '#' + obj.userData.baseColor.toString(16).padStart(6, '0');
                }
            }
        }

        function changeSelectedColor(colorHex) {
            if(!selectedObject) return;
            const colorInt = parseInt(colorHex.slice(1), 16);
            selectedObject.userData.baseColor = colorInt;
            
            selectedObject.children.forEach(child => {
                if(child.material && child.material.color) {
                    child.material.color.setHex(colorInt);
                }
            });
        }

        function rotateSelected(angle) {
            if(selectedObject) {
                selectedObject.userData.rotation = (selectedObject.userData.rotation + angle) % 360;
                selectedObject.rotation.y = selectedObject.userData.rotation * Math.PI / 180;
            }
        }

        function deleteSelected() {
            if(selectedObject) {
                scene.remove(selectedObject);
                objects.splice(objects.indexOf(selectedObject), 1);
                selectedObject = null;
                document.getElementById('selectedPanel').classList.add('hidden');
                document.getElementById('selectedInfo').textContent = 'Ничего не выбрано';
            }
        }

        function clearAll() {
            objects.forEach(obj => scene.remove(obj));
            objects.length = 0;
            selectedObject = null;
            document.getElementById('selectedPanel').classList.add('hidden');
            document.getElementById('selectedInfo').textContent = 'Ничего не выбрано';
        }

        // ========== MOUSE INTERACTION ==========
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isDragging = false;
        let dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
        let dragPoint = new THREE.Vector3();

        document.addEventListener('mousedown', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objects, true);

            if(intersects.length > 0) {
                let obj = intersects[0].object;
                while(obj.parent && !objects.includes(obj)) obj = obj.parent;
                selectObject(obj);
                isDragging = true;
            }
        });

        document.addEventListener('mousemove', (e) => {
            if(isDragging && selectedObject) {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                raycaster.ray.intersectPlane(dragPlane, dragPoint);
                selectedObject.position.x = dragPoint.x;
                selectedObject.position.z = dragPoint.z;
            }
        });

        document.addEventListener('mouseup', () => { isDragging = false; });

        document.addEventListener('keydown', (e) => {
            if(e.key === 'r' || e.key === 'R') rotateSelected(45);
            if(e.key === 'Delete') deleteSelected();
        });

        // ========== ANIMATION LOOP ==========
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        animate();

        // ========== RESPONSIVE ==========
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Добавляем предметы по умолчанию
        addObject('chair');
        addObject('table');
        addObject('monitor');
    </script>
</body>
</html>
