<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Exhibition Booth Configurator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100vh;
            gap: 0;
        }

        /* ==================== SIDEBAR ==================== */
        .sidebar {
            width: 350px;
            background: white;
            box-shadow: 2px 0 20px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            margin-bottom: 30px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 15px;
        }

        .sidebar-header h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            font-size: 12px;
            color: #999;
        }

        /* ==================== CATEGORIES ==================== */
        .categories {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
        }

        .category {
            background: #f5f5f5;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .category.active {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .category-header {
            padding: 15px;
            background: #667eea;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            user-select: none;
        }

        .category.active .category-header {
            background: #764ba2;
        }

        .category-header:hover {
            background: #764ba2;
        }

        .category-icon {
            font-size: 20px;
        }

        .category-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            padding: 0 15px;
        }

        .category.active .category-content {
            max-height: 500px;
            padding: 15px;
        }

        /* ==================== OPTIONS ==================== */
        .option-group {
            margin-bottom: 15px;
        }

        .option-label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        .option-items {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .option-item {
            padding: 10px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            font-size: 12px;
            transition: all 0.2s ease;
            color: #333;
        }

        .option-item:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option-item.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .color-picker {
            width: 100%;
            height: 40px;
            border: 2px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .color-picker:hover {
            border-color: #667eea;
        }

        /* ==================== PRICE DISPLAY ==================== */
        .price-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: auto;
            text-align: center;
        }

        .price-label {
            font-size: 12px;
            text-transform: uppercase;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .price-value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: white;
            color: #667eea;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* ==================== CANVAS AREA ==================== */
        .canvas-container {
            flex: 1;
            position: relative;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .canvas-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 12px;
            color: #333;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .canvas-info strong {
            display: block;
            margin-bottom: 5px;
            color: #667eea;
        }

        /* ==================== SCROLLBAR ==================== */
        .sidebar::-webkit-scrollbar {
            width: 8px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 4px;
        }

        .sidebar::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 1024px) {
            .sidebar {
                width: 300px;
            }

            .option-items {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                max-height: 40vh;
            }

            .canvas-container {
                height: 60vh;
            }
        }

        /* ==================== ANIMATIONS ==================== */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .category {
            animation: fadeIn 0.3s ease;
        }

        /* ==================== LOADING ==================== */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            z-index: 100;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>🎨 Booth Designer</h1>
                <p>Создайте свой идеальный стенд</p>
            </div>

            <div class="categories">
                <!-- DIMENSIONS -->
                <div class="category active">
                    <div class="category-header">
                        <span><span class="category-icon">📏</span> Размеры</span>
                        <span>▼</span>
                    </div>
                    <div class="category-content">
                        <div class="option-group">
                            <label class="option-label">Длина (м)</label>
                            <div class="option-items">
                                <button class="option-item" data-length="2">2m</button>
                                <button class="option-item" data-length="3">3m</button>
                                <button class="option-item selected" data-length="4">4m</button>
                                <button class="option-item" data-length="5">5m</button>
                                <button class="option-item" data-length="6">6m</button>
                                <button class="option-item" data-length="8">8m</button>
                            </div>
                        </div>
                        <div class="option-group">
                            <label class="option-label">Ширина (м)</label>
                            <div class="option-items">
                                <button class="option-item" data-width="2">2m</button>
                                <button class="option-item selected" data-width="3">3m</button>
                                <button class="option-item" data-width="4">4m</button>
                                <button class="option-item" data-width="5">5m</button>
                                <button class="option-item" data-width="6">6m</button>
                            </div>
                        </div>
                        <div class="option-group">
                            <label class="option-label">Высота (м)</label>
                            <div class="option-items">
                                <button class="option-item" data-height="2">2m</button>
                                <button class="option-item selected" data-height="2.5">2.5m</button>
                                <button class="option-item" data-height="3">3m</button>
                                <button class="option-item" data-height="3.5">3.5m</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- WALLS -->
                <div class="category">
                    <div class="category-header">
                        <span><span class="category-icon">🧱</span> Стены</span>
                        <span>▼</span>
                    </div>
                    <div class="category-content">
                        <div class="option-group">
                            <label class="option-label">Цвет стен</label>
                            <input type="color" id="wallColor" class="color-picker" value="#ffffff">
                        </div>
                        <div class="option-group">
                            <label class="option-label">Материал</label>
                            <div class="option-items">
                                <button class="option-item selected" data-material="plastic">Пластик</button>
                                <button class="option-item" data-material="wood">Дерево</button>
                                <button class="option-item" data-material="metal">Металл</button>
                                <button class="option-item" data-material="fabric">Ткань</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- FLOOR -->
                <div class="category">
                    <div class="category-header">
                        <span><span class="category-icon">🏢</span> Пол</span>
                        <span>▼</span>
                    </div>
                    <div class="category-content">
                        <div class="option-group">
                            <label class="option-label">Цвет пола</label>
                            <input type="color" id="floorColor" class="color-picker" value="#cccccc">
                        </div>
                        <div class="option-group">
                            <label class="option-label">Тип покрытия</label>
                            <div class="option-items">
                                <button class="option-item selected" data-floor="carpet">Ковролин</button>
                                <button class="option-item" data-floor="tile">Плитка</button>
                                <button class="option-item" data-floor="wood">Паркет</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- FURNITURE -->
                <div class="category">
                    <div class="category-header">
                        <span><span class="category-icon">🪑</span> Мебель</span>
                        <span>▼</span>
                    </div>
                    <div class="category-content">
                        <div class="option-group">
                            <label class="option-label">Добавить мебель</label>
                            <div class="option-items">
                                <button class="option-item" data-furniture="table">Стол</button>
                                <button class="option-item" data-furniture="chair">Стул</button>
                                <button class="option-item" data-furniture="counter">Стойка</button>
                                <button class="option-item" data-furniture="shelf">Полка</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- LIGHTING -->
                <div class="category">
                    <div class="category-header">
                        <span><span class="category-icon">💡</span> Освещение</span>
                        <span>▼</span>
                    </div>
                    <div class="category-content">
                        <div class="option-group">
                            <label class="option-label">Интенсивность</label>
                            <input type="range" id="lightIntensity" min="0.3" max="2" step="0.1" value="1" style="width: 100%; cursor: pointer;">
                            <small id="lightValue" style="color: #999; margin-top: 5px; display: block;">Нормальное</small>
                        </div>
                        <div class="option-group">
                            <label class="option-label">Тип освещения</label>
                            <div class="option-items">
                                <button class="option-item selected" data-lighting="warm">Теплое</button>
                                <button class="option-item" data-lighting="cool">Холодное</button>
                                <button class="option-item" data-lighting="neutral">Нейтральное</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- EQUIPMENT -->
                <div class="category">
                    <div class="category-header">
                        <span><span class="category-icon">📺</span> Оборудование</span>
                        <span>▼</span>
                    </div>
                    <div class="category-content">
                        <div class="option-group">
                            <label class="option-label">Добавить оборудование</label>
                            <div class="option-items">
                                <button class="option-item" data-equipment="monitor">Монитор</button>
                                <button class="option-item" data-equipment="speaker">Динамик</button>
                                <button class="option-item" data-equipment="camera">Камера</button>
                                <button class="option-item" data-equipment="banner">Баннер</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- PRICE SECTION -->
            <div class="price-section">
                <div class="price-label">Итоговая стоимость</div>
                <div class="price-value" id="totalPrice">8 900 €</div>
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="saveConfigure()">💾 Сохранить</button>
                    <button class="btn btn-secondary" onclick="resetConfigure()">🔄 Сброс</button>
                </div>
            </div>
        </div>

        <!-- CANVAS AREA -->
        <div class="canvas-container">
            <canvas id="canvas"></canvas>
            <div class="canvas-info">
                <strong>💡 Советы:</strong>
                🖱️ Вращайте: левая кнопка<br>
                🔍 Масштаб: колесо мыши<br>
                ⬆️ Сдвиг: правая кнопка
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="configurator_v2.js"></script>
</body>
</html>
