<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Booth Configurator Pro</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            overflow: hidden;
            color: #fff;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: rgba(20, 20, 40, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 32px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-content h2 {
            margin-bottom: 24px;
            font-weight: 600;
            font-size: 28px;
            background: linear-gradient(135deg, #fff, #a0a0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .modal-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .modal-btn {
            padding: 12px 28px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .modal-btn.new {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
        }

        .modal-btn.load {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            border: none;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .file-input {
            display: none;
        }

        .app {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .lang-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            padding: 6px 16px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: 0.2s;
        }

        .lang-btn.active {
            background: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        .sidebar {
            width: 380px;
            background: rgba(15, 15, 30, 0.85);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px;
            z-index: 10;
        }

        .sidebar-header {
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .sidebar-header h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #b0b0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .sidebar-header p {
            font-size: 13px;
            opacity: 0.7;
            margin-top: 6px;
        }

        .category {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            transition: all 0.2s;
        }

        .category-header {
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.3);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            font-size: 15px;
        }

        .category-content {
            padding: 0 16px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
        }

        .category.active .category-content {
            max-height: 600px;
            padding: 16px;
        }

        .option-group {
            margin-bottom: 18px;
        }

        .option-label {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
            color: #aaa;
            display: block;
            margin-bottom: 8px;
        }

        .option-items {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .option-item {
            background: rgba(30, 30, 50, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.1s;
            color: #eee;
        }

        .option-item.selected {
            background: #667eea;
            border-color: #667eea;
            color: white;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .color-picker {
            width: 100%;
            height: 38px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
        }

        .counter-control {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 6px;
        }

        .counter-btn {
            background: #2c3e66;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.1s;
        }

        .counter-btn:hover {
            background: #1e2a47;
        }

        .counter-value {
            font-size: 18px;
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }

        .price-section {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            border-radius: 24px;
            padding: 18px;
            margin-top: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
        }

        .price-value {
            font-size: 32px;
            font-weight: 700;
            margin: 8px 0;
        }

        .price-label {
            font-size: 12px;
            opacity: 0.8;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 80px;
            padding: 10px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .canvas-container {
            flex: 1;
            position: relative;
            background: linear-gradient(135deg, #0a0e27, #1a1a3e);
        }

        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .info-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .selected-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(20, 20, 40, 0.9);
            backdrop-filter: blur(12px);
            padding: 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: none;
            min-width: 200px;
            z-index: 50;
        }

        .selected-panel.active {
            display: block;
        }

        .selected-panel h3 {
            margin-bottom: 12px;
            font-size: 14px;
            color: #ffaa44;
        }

        .selected-panel .option-group {
            margin-bottom: 12px;
        }

        .slider-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 6px;
        }

        .slider-control input[type="range"] {
            flex: 1;
            cursor: pointer;
        }

        .slider-control span {
            font-size: 12px;
            min-width: 40px;
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; max-height: 48%; }
            .app { flex-direction: column; }
            .canvas-container { height: 52%; }
        }
    </style>
</head>
<body>

<div id="modeModal" class="modal">
    <div class="modal-content">
        <h2>✨ Конфигуратор стенда</h2>
        <div class="modal-buttons">
            <button class="modal-btn new" id="newModeBtn">➕ Создать новый</button>
            <button class="modal-btn load" id="loadModeBtn">📂 Загрузить конфиг</button>
        </div>
        <input type="file" id="configFileInput" accept=".json" style="display:none">
    </div>
</div>

<div class="lang-bar">
    <button class="lang-btn active" data-lang="ru">RU</button>
    <button class="lang-btn" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="lv">LV</button>
</div>

<div class="app">
    <div class="sidebar">
        <div class="sidebar-header">
            <h1 id="title">🎨 Booth Designer</h1>
            <p id="subtitle">Перетаскивайте объекты левой кнопкой</p>
        </div>

        <div class="category active">
            <div class="category-header"><span id="dimLabel">📐 Размеры</span><span>▼</span></div>
            <div class="category-content">
                <div class="option-group"><label id="lenLabel" class="option-label">Длина (м)</label>
                    <div class="option-items" id="lengthOpts">
                        <button class="option-item" data-length="2">2</button><button class="option-item" data-length="3">3</button>
                        <button class="option-item selected" data-length="4">4</button><button class="option-item" data-length="5">5</button>
                        <button class="option-item" data-length="6">6</button><button class="option-item" data-length="8">8</button>
                    </div>
                </div>
                <div class="option-group"><label id="widLabel" class="option-label">Ширина (м)</label>
                    <div class="option-items" id="widthOpts">
                        <button class="option-item" data-width="2">2</button><button class="option-item selected" data-width="3">3</button>
                        <button class="option-item" data-width="4">4</button><button class="option-item" data-width="5">5</button>
                        <button class="option-item" data-width="6">6</button>
                    </div>
                </div>
                <div class="option-group"><label id="heiLabel" class="option-label">Высота (м)</label>
                    <div class="option-items" id="heightOpts">
                        <button class="option-item" data-height="2">2</button><button class="option-item selected" data-height="2.5">2.5</button>
                        <button class="option-item" data-height="3">3</button><button class="option-item" data-height="3.5">3.5</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="category">
            <div class="category-header"><span id="wallsLabel">🧱 Стены</span><span>▼</span></div>
            <div class="category-content">
                <div class="option-group"><label id="wallsCountLabel" class="option-label">Количество стен</label>
                    <div class="option-items" id="wallsCountOpts">
                        <button class="option-item" data-walls="1">1 стена</button>
                        <button class="option-item" data-walls="2">2 стены</button>
                        <button class="option-item selected" data-walls="3">3 стены</button>
                    </div>
                </div>
                <div class="option-group"><label id="wallColorLabel" class="option-label">Цвет стен</label><input type="color" id="wallColorPicker" class="color-picker" value="#ffffff"></div>
                <div class="option-group"><label id="wallMatLabel" class="option-label">Материал</label>
                    <div class="option-items" id="wallMatOpts">
                        <button class="option-item selected" data-wallmat="plastic">Пластик</button>
                        <button class="option-item" data-wallmat="wood">Дерево</button>
                        <button class="option-item" data-wallmat="metal">Металл</button>
                        <button class="option-item" data-wallmat="fabric">Ткань</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="category">
            <div class="category-header"><span id="floorLabel">🏢 Пол</span><span>▼</span></div>
            <div class="category-content">
                <div class="option-group"><label id="floorColorLabel" class="option-label">Цвет пола</label><input type="color" id="floorColorPicker" class="color-picker" value="#cccccc"></div>
                <div class="option-group"><label id="floorTypeLabel" class="option-label">Тип покрытия</label>
                    <div class="option-items" id="floorTypeOpts">
                        <button class="option-item selected" data-floortype="carpet">Ковролин</button>
                        <button class="option-item" data-floortype="tile">Плитка</button>
                        <button class="option-item" data-floortype="wood">Паркет</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="category">
            <div class="category-header"><span id="furnLabel">🪑 Мебель</span><span>▼</span></div>
            <div class="category-content" id="furnitureUI"></div>
        </div>

        <div class="category">
            <div class="category-header"><span id="lightLabel">💡 Освещение</span><span>▼</span></div>
            <div class="category-content">
                <div class="option-group"><label id="lightTypeLabel" class="option-label">Тип света</label>
                    <div class="option-items" id="lightTypeOpts">
                        <button class="option-item selected" data-lighttype="warm">Тёплый</button>
                        <button class="option-item" data-lighttype="cool">Холодный</button>
                        <button class="option-item" data-lighttype="neutral">Нейтральный</button>
                    </div>
                </div>
                <div class="option-group"><label id="lampCountLabel" class="option-label">Количество ламп</label>
                    <div class="counter-control"><button class="counter-btn" id="lampMinus">-</button><span class="counter-value" id="lampCountVal">2</span><button class="counter-btn" id="lampPlus">+</button></div>
                </div>
            </div>
        </div>

        <div class="category">
            <div class="category-header"><span id="equipLabel">📺 Оборудование</span><span>▼</span></div>
            <div class="category-content" id="equipmentUI"></div>
        </div>

        <div class="price-section">
            <div class="price-label" id="totalLabel">Итоговая стоимость</div>
            <div class="price-value" id="totalPrice">0 €</div>
            <div class="action-buttons">
                <button class="btn btn-primary" id="saveBtn">💾 Сохранить</button>
                <button class="btn btn-secondary" id="resetBtn">🔄 Сброс</button>
                <button class="btn btn-secondary" id="loadConfigBtn">📂 Загрузить JSON</button>
            </div>
        </div>
    </div>
    <div class="canvas-container">
        <canvas id="canvas"></canvas>
        <div class="selected-panel" id="selectedPanel">
            <h3 id="selectedName">Выбран объект</h3>
            <div class="option-group">
                <label class="option-label">Цвет</label>
                <input type="color" id="objectColorPicker" class="color-picker">
            </div>
            <div class="option-group">
                <label class="option-label">Вращение</label>
                <div class="slider-control">
                    <input type="range" id="rotationSlider" min="0" max="360" value="0">
                    <span id="rotationValue">0°</span>
                </div>
            </div>
            <div class="action-buttons">
                <button class="btn btn-secondary" id="deleteObjBtn">🗑️ Удалить</button>
            </div>
        </div>
        <div class="info-panel" id="infoText">
            🖱️ ЛКМ по объекту → перетащить | ЛКМ по фону → вращать | ПКМ → панорама | R → повернуть
        </div>
    </div>
</div>

<script type="module">
    import * as THREE from 'three';

    // -------------------- ПЕРЕВОДЫ --------------------
    const translations = {
        ru: {
            title:"🎨 Booth Designer", subtitle:"Перетаскивайте объекты левой кнопкой",
            dimLabel:"📐 Размеры", lenLabel:"Длина (м)", widLabel:"Ширина (м)", heiLabel:"Высота (м)",
            wallsLabel:"🧱 Стены", wallsCountLabel:"Количество стен", wallColorLabel:"Цвет стен", wallMatLabel:"Материал",
            floorLabel:"🏢 Пол", floorColorLabel:"Цвет пола", floorTypeLabel:"Тип покрытия",
            furnLabel:"🪑 Мебель", lightLabel:"💡 Освещение", lightTypeLabel:"Тип света", lampCountLabel:"Количество ламп",
            equipLabel:"📺 Оборудование", totalLabel:"Итоговая стоимость",
            plastic:"Пластик", wood:"Дерево", metal:"Металл", fabric:"Ткань",
            carpet:"Ковролин", tile:"Плитка", parquet:"Паркет",
            warm:"Тёплый", cool:"Холодный", neutral:"Нейтральный",
            table:"Стол", chair:"Стул", counter:"Стойка", shelf:"Полка", sofa:"Диван", showcase:"Витрина",
            monitor:"Монитор", speaker:"Динамик", camera:"Камера", banner:"Баннер",
            oneWall:"1 стена", twoWalls:"2 стены", threeWalls:"3 стены"
        },
        en: {
            title:"🎨 Booth Designer", subtitle:"Drag objects with LMB",
            dimLabel:"📐 Dimensions", lenLabel:"Length (m)", widLabel:"Width (m)", heiLabel:"Height (m)",
            wallsLabel:"🧱 Walls", wallsCountLabel:"Number of walls", wallColorLabel:"Wall Color", wallMatLabel:"Material",
            floorLabel:"🏢 Floor", floorColorLabel:"Floor Color", floorTypeLabel:"Floor Type",
            furnLabel:"🪑 Furniture", lightLabel:"💡 Lighting", lightTypeLabel:"Light Type", lampCountLabel:"Lamps",
            equipLabel:"📺 Equipment", totalLabel:"Total Price",
            plastic:"Plastic", wood:"Wood", metal:"Metal", fabric:"Fabric",
            carpet:"Carpet", tile:"Tile", parquet:"Parquet",
            warm:"Warm", cool:"Cool", neutral:"Neutral",
            table:"Table", chair:"Chair", counter:"Counter", shelf:"Shelf", sofa:"Sofa", showcase:"Showcase",
            monitor:"Monitor", speaker:"Speaker", camera:"Camera", banner:"Banner",
            oneWall:"1 wall", twoWalls:"2 walls", threeWalls:"3 walls"
        },
        lv: {
            title:"🎨 Stenda Dizainers", subtitle:"Velciet objektus ar LMB",
            dimLabel:"📐 Izmēri", lenLabel:"Garums (m)", widLabel:"Platums (m)", heiLabel:"Augstums (m)",
            wallsLabel:"🧱 Sienas", wallsCountLabel:"Sienu skaits", wallColorLabel:"Sienu krāsa", wallMatLabel:"Materiāls",
            floorLabel:"🏢 Grīda", floorColorLabel:"Grīdas krāsa", floorTypeLabel:"Grīdas tips",
            furnLabel:"🪑 Mēbeles", lightLabel:"💡 Apgaismojums", lightTypeLabel:"Gaismas tips", lampCountLabel:"Lampu skaits",
            equipLabel:"📺 Aprīkojums", totalLabel:"Kopējā cena",
            plastic:"Plastmasa", wood:"Koks", metal:"Metāls", fabric:"Audums",
            carpet:"Paklājs", tile:"Flīzes", parquet:"Parkets",
            warm:"Silts", cool:"Vēss", neutral:"Neitrāls",
            table:"Galds", chair:"Krēsls", counter:"Skaitītājs", shelf:"Plaukts", sofa:"Dīvāns", showcase:"Vitrīna",
            monitor:"Monitors", speaker:"Skaļrunis", camera:"Kamera", banner:"Baneris",
            oneWall:"1 siena", twoWalls:"2 sienas", threeWalls:"3 sienas"
        }
    };

    let currentLang = 'ru';
    function applyLanguage() {
        const t = translations[currentLang];
        document.getElementById('title').innerText = t.title;
        document.getElementById('subtitle').innerText = t.subtitle;
        document.getElementById('dimLabel').innerHTML = t.dimLabel;
        document.getElementById('lenLabel').innerText = t.lenLabel;
        document.getElementById('widLabel').innerText = t.widLabel;
        document.getElementById('heiLabel').innerText = t.heiLabel;
        document.getElementById('wallsLabel').innerHTML = t.wallsLabel;
        document.getElementById('wallsCountLabel').innerText = t.wallsCountLabel;
        document.getElementById('wallColorLabel').innerText = t.wallColorLabel;
        document.getElementById('wallMatLabel').innerText = t.wallMatLabel;
        document.getElementById('floorLabel').innerHTML = t.floorLabel;
        document.getElementById('floorColorLabel').innerText = t.floorColorLabel;
        document.getElementById('floorTypeLabel').innerText = t.floorTypeLabel;
        document.getElementById('furnLabel').innerHTML = t.furnLabel;
        document.getElementById('lightLabel').innerHTML = t.lightLabel;
        document.getElementById('lightTypeLabel').innerText = t.lightTypeLabel;
        document.getElementById('lampCountLabel').innerText = t.lampCountLabel;
        document.getElementById('equipLabel').innerHTML = t.equipLabel;
        document.getElementById('totalLabel').innerText = t.totalLabel;
        document.getElementById('infoText').innerHTML = "🖱️ ЛКМ по объекту → перетащить | ЛКМ по фону → вращать | ПКМ → панорама | R → повернуть";
        document.querySelectorAll('[data-wallmat]').forEach(btn => { if(t[btn.dataset.wallmat]) btn.innerText = t[btn.dataset.wallmat]; });
        document.querySelectorAll('[data-floortype]').forEach(btn => { if(t[btn.dataset.floortype]) btn.innerText = t[btn.dataset.floortype]; });
        document.querySelectorAll('[data-lighttype]').forEach(btn => { if(t[btn.dataset.lighttype]) btn.innerText = t[btn.dataset.lighttype]; });
        const wallsCountBtns = document.querySelectorAll('[data-walls]');
        if(wallsCountBtns.length===3) { wallsCountBtns[0].innerText = t.oneWall; wallsCountBtns[1].innerText = t.twoWalls; wallsCountBtns[2].innerText = t.threeWalls; }
        updateFurnitureUITexts();
        updateEquipmentUITexts();
    }
    function updateFurnitureUITexts() {
        const t = translations[currentLang];
        const types = ['table','chair','counter','shelf','sofa','showcase'];
        types.forEach(type => {
            const label = document.querySelector(`#furnitureUI .option-label[data-type="${type}"]`);
            if(label && t[type]) label.innerText = t[type];
        });
    }
    function updateEquipmentUITexts() {
        const t = translations[currentLang];
        const types = ['monitor','speaker','camera','banner'];
        types.forEach(type => {
            const label = document.querySelector(`#equipmentUI .option-label[data-type="${type}"]`);
            if(label && t[type]) label.innerText = t[type];
        });
    }

    // -------------------- КОНФИГУРАЦИЯ --------------------

        dims: { length:4, width:3, height:2.5 },
        wallsCount: 3,
        wallColor: '#ffffff',

        floorColor: '#cccccc',

    // 3D глобальные
    let scene, camera, renderer, boothGroup;

    // Текстуры
    function createWoodTexture() {
        const canvas = document.createElement('canvas'); canvas.width=512; canvas.height=512;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#c7a47b'; ctx.fillRect(0,0,512,512);
        for(let i=0;i<200;i++){ ctx.beginPath(); ctx.moveTo(i*20,0); ctx.lineTo(i*20+10,512); ctx.lineTo(i*20-10,512); ctx.fillStyle='#a57c52'; ctx.fill(); }
        const tex = new THREE.CanvasTexture(canvas); tex.wrapS=THREE.RepeatWrapping; tex.wrapT=THREE.RepeatWrapping; tex.repeat.set(2,2);
        return tex;
    }
    function createTileTexture() {
        const canvas = document.createElement('canvas'); canvas.width=512; canvas.height=512;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle='#aaaaaa'; ctx.fillRect(0,0,512,512);
        ctx.strokeStyle='#666'; ctx.lineWidth=10;
        for(let i=0;i<8;i++){ ctx.beginPath(); ctx.moveTo(i*64,0); ctx.lineTo(i*64,512); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,i*64); ctx.lineTo(512,i*64); ctx.stroke(); }
        const tex = new THREE.CanvasTexture(canvas); tex.wrapS=THREE.RepeatWrapping; tex.wrapT=THREE.RepeatWrapping; tex.repeat.set(4,4);
        return tex;
    }
    function createParquetTexture() {
        const canvas = document.createElement('canvas'); canvas.width=512; canvas.height=512;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle='#b87c4f'; ctx.fillRect(0,0,512,512);
        for(let i=0;i<20;i++){ ctx.fillStyle='#9b5e2e'; ctx.fillRect(i*50,0,20,512); }
        const tex = new THREE.CanvasTexture(canvas); tex.wrapS=THREE.RepeatWrapping; tex.wrapT=THREE.RepeatWrapping; tex.repeat.set(4,4);
        return tex;
    }

    function getWallMaterial() {
        const color = new THREE.Color(config.wallColor);
        switch(config.wallMaterial){
            case 'wood': return new THREE.MeshStandardMaterial({ map: createWoodTexture(), roughness:0.6, metalness:0.1 });
            case 'metal': return new THREE.MeshStandardMaterial({ color: color, roughness:0.2, metalness:0.9 });
            case 'fabric': return new THREE.MeshStandardMaterial({ color: color, roughness:0.9, metalness:0 });
            default: return new THREE.MeshStandardMaterial({ color: color, roughness:0.3, metalness:0.1 });
        }
    }
    function getFloorMaterial() {
        const color = new THREE.Color(config.floorColor);
        switch(config.floorType){
            case 'tile': return new THREE.MeshStandardMaterial({ map: createTileTexture(), roughness:0.4, metalness:0.05 });
            case 'wood': return new THREE.MeshStandardMaterial({ map: createParquetTexture(), roughness:0.7, metalness:0.05 });
            default: return new THREE.MeshStandardMaterial({ color: color, roughness:0.9, metalness:0 });
        }
    }

                const shelf1 = new THREE.Mesh(new THREE.BoxGeometry(0.7,0.05,0.4), new THREE.MeshStandardMaterial({ color:0x888888 })); shelf1.position.set(0,0.5,0); shelf1.castShadow=true; shgrp.add(shelf1);
                const shelf2 = new THREE.Mesh(new THREE.BoxGeometry(0.7,0.05,0.4), new THREE.MeshStandardMaterial({ color:0x888888 })); shelf2.position.set(0,1.0,0); shelf2.castShadow=true; shgrp.add(shelf2);
                const ledLight = new THREE.PointLight(0x88aaff, 0.5, 5); ledLight.position.set(0,1.3,0); shgrp.add(ledLight);

                for(let i=-1;i<=1;i+=2){ const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,0.75,8), legMat); leg.position.set(i*0.35,0.375,0); leg.castShadow=true; shgrp.add(leg); }
                shgrp.position.set(x,0,z); obj = shgrp; break;
            }
            case 'counter': {
                const cnt = new THREE.Mesh(new THREE.BoxGeometry(1.0,1.0,0.6), new THREE.MeshStandardMaterial({ color:0xccaa88 }));

                const st = new THREE.Mesh(new THREE.BoxGeometry(0.2,0.4,0.2), new THREE.MeshStandardMaterial({ color:0x444444 }));
                st.position.y=0.2; st.castShadow=true; mng.add(st);
                mng.position.set(x,0,z); obj = mng; break;

                sp.position.set(x,0.3,z); sp.castShadow=true; obj = sp; break;
            }

                const cam = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshStandardMaterial({ color:0xdd3333 }));

                if(obj.material) originalColors.set(obj, obj.material.color.clone());

    function rebuildScene() {
        while(boothGroup.children.length) boothGroup.remove(boothGroup.children[0]);
        itemMap.clear();
        originalColors.clear();
        const { length, width, height } = config.dims;
        
        // Пол
        const floorMat = getFloorMaterial();
        const floorPlane = new THREE.Mesh(new THREE.PlaneGeometry(length, width), floorMat);
        floorPlane.rotation.x = -Math.PI/2; floorPlane.receiveShadow = true;
        boothGroup.add(floorPlane);
        
        // Стены
        const wallMat = getWallMaterial();
        const backWall = new THREE.Mesh(new THREE.BoxGeometry(length, height, 0.1), wallMat);
        backWall.position.set(0, height/2, -width/2); backWall.castShadow=true; backWall.receiveShadow=true;
        boothGroup.add(backWall);
        if(config.wallsCount >= 2){
            const leftWall = new THREE.Mesh(new THREE.BoxGeometry(0.1, height, width), wallMat);
            leftWall.position.set(-length/2, height/2, 0); leftWall.castShadow=true; leftWall.receiveShadow=true;
            boothGroup.add(leftWall);
        }
        if(config.wallsCount >= 3){
            const rightWall = new THREE.Mesh(new THREE.BoxGeometry(0.1, height, width), wallMat);
            rightWall.position.set(length/2, height/2, 0); rightWall.castShadow=true; rightWall.receiveShadow=true;
            boothGroup.add(rightWall);
        }
        
        // Потолочные фермы и балки (интерьер павильона)
        const beamMat = new THREE.MeshStandardMaterial({ color:0x555555, roughness:0.7 });
        for(let i=0; i<4; i++){
            const beam = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, length+2), beamMat);
            beam.position.set((i-1.5)*2, height+0.5, 0);
            beam.castShadow=true;
            boothGroup.add(beam);
        }
        
        // Объекты
        config.items.forEach(item => {
            const obj = create3DObject(item.type, item.id, item.posX, item.posZ);
            if(obj) { 
                const rot = objectRotations.get(item.id) || 0;
                obj.rotation.y = rot;
                boothGroup.add(obj); 
                itemMap.set(item.id, obj); 
            }
        });
        
        // Лампы
        lamps.forEach(l => scene.remove(l)); lamps = [];
        const lampColor = config.lightType==='warm'?0xffaa66:(config.lightType==='cool'?0x88aaff:0xffffff);
        const lampIntensity = 0.8;
        for(let i=0;i<config.lampCount;i++){
            const lamp = new THREE.PointLight(lampColor, lampIntensity, 15);
            lamp.castShadow = true;
            lamp.shadow.mapSize.width = 512;
            lamp.shadow.mapSize.height = 512;
            const angle = (i / Math.max(1,config.lampCount)) * Math.PI*2;
            const radiusLight = 3.5;
            lamp.position.set(Math.cos(angle)*radiusLight, 2.8, Math.sin(angle)*radiusLight);
            scene.add(lamp);
            lamps.push(lamp);
        }
        updatePrice();
    }

    function updatePrice(){
        const { length, width, height } = config.dims;
        const area = length*width;
        let total = prices.baseSqm * area;
        total += prices.wallMat[config.wallMaterial] * (2*(length+width)*height);
        total += prices.floor[config.floorType] * area;
        for(let [k,v] of Object.entries(config.furniture)) total += v * prices.furniture[k];
        for(let [k,v] of Object.entries(config.equipment)) total += v * prices.equipment[k];
        total += config.lampCount * prices.lamp;
        document.getElementById('totalPrice').innerHTML = `${Math.round(total).toLocaleString()} €`;
    }

    function getMousePlaneIntersect(event, plane, outVec){
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2();
        mouse.x = ((event.clientX - rect.left)/rect.width)*2 - 1;
        mouse.y = -((event.clientY - rect.top)/rect.height)*2 + 1;
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);
        if(raycaster.ray.intersectPlane(plane, outVec)) return true;
        return false;
    }

    function highlightObject(obj, highlight){
        if(!obj) return;
        const applyColor = (mesh) => {
            if(mesh.material) {
                if(highlight) {
                    mesh.material.emissive = new THREE.Color(0x442200);
                    mesh.material.color.setHex(0xffaa44);
                } else {
                    mesh.material.emissive = new THREE.Color(0x000000);
                    const orig = originalColors.get(mesh);
                    if(orig) mesh.material.color.copy(orig);
                }
            }
        };
        if(obj.isGroup) {
            obj.children.forEach(child => applyColor(child));
        } else {
            applyColor(obj);
        }
    }

    function changeObjectColor(obj, colorHex) {
        if(!obj) return;
        const color = new THREE.Color(colorHex);
        const applyColor = (mesh) => {
            if(mesh.material && !mesh.userData.isLight) {
                mesh.material.color.copy(color);
                originalColors.set(mesh, color.clone());
            }
        };
        if(obj.isGroup) {
            obj.children.forEach(child => applyColor(child));
        } else {
            applyColor(obj);
        }
    }

    function rotateObject(obj, angle) {
        if(obj) obj.rotation.y = angle * Math.PI / 180;
    }

    function onMouseDownObj(e){
        const rect = renderer.domElement.getBoundingClientRect();
        const mouse = new THREE.Vector2();
        mouse.x = ((e.clientX - rect.left)/rect.width)*2 - 1;
        mouse.y = -((e.clientY - rect.top)/rect.height)*2 + 1;
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(Array.from(itemMap.values()), true);
        if(intersects.length){
            let hit = intersects[0].object;
            while(hit.parent !== boothGroup && hit.parent){
                if(hit.userData && hit.userData.itemId){ selectedObj = hit; break; }
                hit = hit.parent;
            }
            if(selectedObj && selectedObj.userData.itemId){
                selectedId = selectedObj.userData.itemId;
                const yLev = selectedObj.position.y;
                dragPlane.set(new THREE.Vector3(0,1,0), yLev);
                const p = new THREE.Vector3();
                if(getMousePlaneIntersect(e, dragPlane, p)) dragOffsetVec.copy(selectedObj.position).sub(p);
                dragActive = true;
                dragBtn = 1;
                lastMousePos = {x:e.clientX, y:e.clientY};
                highlightObject(selectedObj, true);
                
                // Показать панель управления
                const panel = document.getElementById('selectedPanel');
                panel.classList.add('active');
                document.getElementById('selectedName').innerText = `Выбран: ${selectedObj.userData.type}`;
                document.getElementById('objectColorPicker').value = '#' + selectedObj.children[0].material.color.getHexString();
                const rot = objectRotations.get(selectedId) || 0;
                document.getElementById('rotationSlider').value = rot;
                document.getElementById('rotationValue').innerText = rot + '°';
                
                e.preventDefault();
                e.stopPropagation();
                return true;
            }
        }
        return false;
    }

    function onMouseMoveObj(e){
        if(selectedObj && dragBtn===1 && selectedId){
            const p = new THREE.Vector3();
            if(getMousePlaneIntersect(e, dragPlane, p)){
                let newPos = p.clone().add(dragOffsetVec);
                const limitX = (config.dims.length/2)-0.7;
                const limitZ = (config.dims.width/2)-0.7;
                newPos.x = Math.max(-limitX, Math.min(limitX, newPos.x));
                newPos.z = Math.max(-limitZ, Math.min(limitZ, newPos.z));
                selectedObj.position.copy(newPos);
                const item = config.items.find(i=>i.id===selectedId);
                if(item){ item.posX = newPos.x; item.posZ = newPos.z; }
            }
            lastMousePos = {x:e.clientX, y:e.clientY};
            e.preventDefault();
            return;
        }
    }

    function onMouseUpObj(){ 
        if(selectedObj){
            highlightObject(selectedObj, false);
            selectedObj=null; selectedId=null; 
        }
        dragActive=false; dragBtn=0; 
    }

    function initThree(){
        const canvas = document.getElementById('canvas');
        const w = canvas.clientWidth, h = canvas.clientHeight;
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.015);
        camera = new THREE.PerspectiveCamera(45, w/h, 0.1, 100);
        renderer = new THREE.WebGLRenderer({canvas, antialias:true});
        renderer.setSize(w,h);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        
        // Звездный фон
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 1200;
        const starPos = [];
        for(let i=0;i<starCount;i++){ starPos.push((Math.random()-0.5)*200); starPos.push((Math.random()-0.5)*100); starPos.push((Math.random()-0.5)*80-40); }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos),3));
        const starMat = new THREE.PointsMaterial({color:0xffffff, size:0.08});
        const stars = new THREE.Points(starGeometry, starMat);
        scene.add(stars);
        
        // Основной свет
        const ambLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambLight);
        
        boothGroup = new THREE.Group();
        scene.add(boothGroup);
        
        camera.position.set(5, 3, 5);
        camera.lookAt(center);
        
        rebuildScene();
        
        renderer.domElement.addEventListener('mousedown', (e) => {
            if(e.button === 0) { if(!onMouseDownObj(e)) dragActive=true; dragBtn=0; }
            else if(e.button === 2) { dragActive=true; dragBtn=2; }
            lastMousePos = {x:e.clientX, y:e.clientY};
        });
        renderer.domElement.addEventListener('mousemove', (e) => {
            onMouseMoveObj(e);
            if(dragActive && dragBtn!==1){
                const dx = e.clientX - lastMousePos.x, dy = e.clientY - lastMousePos.y;
                if(dragBtn===0) { orbitX -= dx*0.005; orbitY -= dy*0.005; }
                else if(dragBtn===2) { panX -= dx*0.01; panY += dy*0.01; }
                lastMousePos = {x:e.clientX, y:e.clientY};
            }
        });
        renderer.domElement.addEventListener('mouseup', () => { onMouseUpObj(); dragActive=false; dragBtn=0; });
        renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());
        renderer.domElement.addEventListener('wheel', (e) => { radius += e.deltaY*0.01; radius = Math.max(2, Math.min(20, radius)); e.preventDefault(); });
        
        document.addEventListener('keydown', (e) => {
            if(e.key === 'r' || e.key === 'R') {
                if(selectedObj && selectedId) {
                    let rot = (objectRotations.get(selectedId) || 0) + 45;
                    if(rot >= 360) rot -= 360;
                    objectRotations.set(selectedId, rot);
                    rotateObject(selectedObj, rot);
                    document.getElementById('rotationSlider').value = rot;
                    document.getElementById('rotationValue').innerText = rot + '°';
                }
            }
        });
        
        document.getElementById('objectColorPicker').addEventListener('change', (e) => {
            if(selectedObj && selectedId) {
                changeObjectColor(selectedObj, e.target.value);
            }
        });
        
        document.getElementById('rotationSlider').addEventListener('input', (e) => {
            if(selectedObj && selectedId) {
                const rot = parseInt(e.target.value);
                objectRotations.set(selectedId, rot);
                rotateObject(selectedObj, rot);
                document.getElementById('rotationValue').innerText = rot + '°';
            }
        });
        
        document.getElementById('deleteObjBtn').addEventListener('click', () => {
            if(selectedId) {
                config.items = config.items.filter(i => i.id !== selectedId);
                itemMap.delete(selectedId);
                objectRotations.delete(selectedId);
                boothGroup.remove(selectedObj);
                selectedObj = null;
                selectedId = null;
                document.getElementById('selectedPanel').classList.remove('active');
                rebuildScene();
            }
        });
        
        function animate() {
            requestAnimationFrame(animate);
            const orbitRad = Math.max(0.1, Math.min(Math.PI-0.1, orbitY));
            camera.position.x = center.x + radius * Math.sin(orbitRad) * Math.cos(orbitX);
            camera.position.y = center.y + radius * Math.cos(orbitRad);
            camera.position.z = center.z + radius * Math.sin(orbitRad) * Math.sin(orbitX);
            camera.position.add(new THREE.Vector3(panX, panY, 0));
            camera.lookAt(center);
            renderer.render(scene, camera);
        }
        animate();
    }

    // Инициализация UI
    function buildFurnitureUI() {
        const html = ['table','chair','counter','shelf','sofa','showcase'].map(type => `
            <div class="option-group">
                <label class="option-label" data-type="${type}">${translations[currentLang][type]}</label>

                    <span class="counter-value" data-type="${type}">0</span>
                    <button class="counter-btn" data-action="plus" data-type="${type}">+</button>

            </div>
        `).join('');
        document.getElementById('furnitureUI').innerHTML = html;
        document.querySelectorAll('#furnitureUI .counter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const type = btn.dataset.type;
                const action = btn.dataset.action;
                const current = config.furniture[type] || 0;
                const newVal = action === 'plus' ? current + 1 : Math.max(0, current - 1);
                config.furniture[type] = newVal;
                document.querySelector(`#furnitureUI .counter-value[data-type="${type}"]`).innerText = newVal;
                addOrRemoveFurniture(type, current, newVal);
                updatePrice();
            });
        });
    }

    function buildEquipmentUI() {
        const html = ['monitor','speaker','camera','banner'].map(type => `
            <div class="option-group">
                <label class="option-label" data-type="${type}">${translations[currentLang][type]}</label>
                <div class="counter-control">
                    <button class="counter-btn" data-action="minus" data-type="${type}">-</button>
                    <span class="counter-value" data-type="${type}">0</span>
                    <button class="counter-btn" data-action="plus" data-type="${type}">+</button>
                </div>
            </div>
        `).join('');
        document.getElementById('equipmentUI').innerHTML = html;
        document.querySelectorAll('#equipmentUI .counter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const type = btn.dataset.type;
                const action = btn.dataset.action;
                const current = config.equipment[type] || 0;
                const newVal = action === 'plus' ? current + 1 : Math.max(0, current - 1);
                config.equipment[type] = newVal;
                document.querySelector(`#equipmentUI .counter-value[data-type="${type}"]`).innerText = newVal;
                addOrRemoveEquipment(type, current, newVal);
                updatePrice();
            });
        });
    }

    function addOrRemoveFurniture(type, oldCount, newCount) {
        if(newCount > oldCount) {
            for(let i=0; i<newCount-oldCount; i++) {
                const item = { id: nextId++, type: type, category: 'furniture', posX: (Math.random()-0.5)*2, posZ: (Math.random()-0.5)*2 };
                config.items.push(item);
                const obj = create3DObject(type, item.id, item.posX, item.posZ);
                if(obj) { boothGroup.add(obj); itemMap.set(item.id, obj); }
            }
        } else {
            for(let i=0; i<oldCount-newCount; i++) {
                const item = config.items.find(it => it.type === type && it.category === 'furniture');
                if(item) {
                    config.items = config.items.filter(it => it.id !== item.id);
                    const obj = itemMap.get(item.id);
                    if(obj) boothGroup.remove(obj);
                    itemMap.delete(item.id);
                    objectRotations.delete(item.id);
                }
            }
        }
    }

    function addOrRemoveEquipment(type, oldCount, newCount) {
        if(newCount > oldCount) {
            for(let i=0; i<newCount-oldCount; i++) {
                const item = { id: nextId++, type: type, category: 'equipment', posX: (Math.random()-0.5)*2, posZ: (Math.random()-0.5)*2 };
                config.items.push(item);
                const obj = create3DObject(type, item.id, item.posX, item.posZ);
                if(obj) { boothGroup.add(obj); itemMap.set(item.id, obj); }
            }
        } else {
            for(let i=0; i<oldCount-newCount; i++) {
                const item = config.items.find(it => it.type === type && it.category === 'equipment');
                if(item) {
                    config.items = config.items.filter(it => it.id !== item.id);
                    const obj = itemMap.get(item.id);
                    if(obj) boothGroup.remove(obj);
                    itemMap.delete(item.id);
                    objectRotations.delete(item.id);
                }
            }
        }
    }

    // Обработчики категорий
    document.querySelectorAll('.category-header').forEach(header => {
        header.addEventListener('click', () => {
            header.parentElement.classList.toggle('active');
        });
    });

    // Обработчики размеров
    document.querySelectorAll('[data-length]').forEach(btn => {
        btn.addEventListener('click', () => {
            config.dims.length = parseFloat(btn.dataset.length);
            document.querySelectorAll('[data-length]').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            rebuildScene();
        });
    });
    document.querySelectorAll('[data-width]').forEach(btn => {
        btn.addEventListener('click', () => {
            config.dims.width = parseFloat(btn.dataset.width);
            document.querySelectorAll('[data-width]').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            rebuildScene();
        });
    });
    document.querySelectorAll('[data-height]').forEach(btn => {
        btn.addEventListener('click', () => {
            config.dims.height = parseFloat(btn.dataset.height);
            document.querySelectorAll('[data-height]').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            rebuildScene();
        });
    });

    // Обработчики стен
    document.querySelectorAll('[data-walls]').forEach(btn => {
        btn.addEventListener('click', () => {
            config.wallsCount = parseInt(btn.dataset.walls);
            document.querySelectorAll('[data-walls]').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            rebuildScene();
        });
    });
    document.getElementById('wallColorPicker').addEventListener('change', (e) => {
        config.wallColor = e.target.value;
        rebuildScene();
    });
    document.querySelectorAll('[data-wallmat]').forEach(btn => {
        btn.addEventListener('click', () => {
            config.wallMaterial = btn.dataset.wallmat;
            document.querySelectorAll('[data-wallmat]').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            rebuildScene();
        });
    });

    // Обработчики пола
    document.getElementById('floorColorPicker').addEventListener('change', (e) => {
        config.floorColor = e.target.value;
        rebuildScene();
    });
    document.querySelectorAll('[data-floortype]').forEach(btn => {
        btn.addEventListener('click', () => {
            config.floorType = btn.dataset.floortype;
            document.querySelectorAll('[data-floortype]').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            rebuildScene();
        });
    });

    // Обработчики освещения
    document.querySelectorAll('[data-lighttype]').forEach(btn => {
        btn.addEventListener('click', () => {
            config.lightType = btn.dataset.lighttype;
            document.querySelectorAll('[data-lighttype]').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            rebuildScene();
        });
    });
    document.getElementById('lampPlus').addEventListener('click', () => {
        config.lampCount++;
        document.getElementById('lampCountVal').innerText = config.lampCount;
        rebuildScene();
    });
    document.getElementById('lampMinus').addEventListener('click', () => {
        if(config.lampCount > 1) config.lampCount--;
        document.getElementById('lampCountVal').innerText = config.lampCount;
        rebuildScene();
    });

    // Обработчики кнопок
    document.getElementById('saveBtn').addEventListener('click', () => {
        const json = JSON.stringify(config);
        const blob = new Blob([json], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'booth_config.json';
        a.click();
    });
    document.getElementById('resetBtn').addEventListener('click', () => {
        config.items = [];
        config.furniture = { table:0, chair:0, counter:0, shelf:0, sofa:0, showcase:0 };
        config.equipment = { monitor:0, speaker:0, camera:0, banner:0 };
        buildFurnitureUI();
        buildEquipmentUI();
        rebuildScene();
    });
    document.getElementById('loadConfigBtn').addEventListener('click', () => {
        document.getElementById('configFileInput').click();
    });
    document.getElementById('configFileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = (evt) => {
                try {
                    const loaded = JSON.parse(evt.target.result);
                    config = loaded;
                    buildFurnitureUI();
                    buildEquipmentUI();
                    rebuildScene();
                } catch(err) { alert('Ошибка загрузки конфига'); }
            };
            reader.readAsText(file);
        }
    });

    // Языки
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentLang = btn.dataset.lang;
            applyLanguage();
        });
    });

    // Модальное окно
    document.getElementById('newModeBtn').addEventListener('click', () => {
        document.getElementById('modeModal').style.display = 'none';
    });
    document.getElementById('loadModeBtn').addEventListener('click', () => {
        document.getElementById('configFileInput').click();
    });

    // Инициализация
    buildFurnitureUI();
    buildEquipmentUI();
    applyLanguage();
    initThree();
</script>

</body>
</html>
